name: "[Build & Deploy] Polyphemus (K8s)"

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/polyphemus/**'
      - 'sdk/**'
      - '.github/workflows/polyphemus-k8s.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to build and push to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Patch values file to trigger ArgoCD deploy after build'
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      environment:
        description: 'Environment to build and push to'
        required: true
        type: string
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        type: string
        default: ''
      deploy:
        description: 'Patch values file to trigger ArgoCD deploy after build'
        required: false
        type: boolean
        default: true

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.deploy_flag.outputs.should_deploy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate environment parameter
        uses: ./.github/actions/validate-environment
        with:
          environment: ${{ inputs.environment || github.event.inputs.environment || 'dev' }}

      - name: Set deploy flag
        id: deploy_flag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ inputs.deploy }}" == "true" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  gate:
    needs: validate-inputs
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Approve build and push
        run: echo "Build and push approved for ${{ github.event.inputs.environment }}"

  build:
    needs: [validate-inputs, gate]
    if: |
      always() &&
      needs.validate-inputs.result == 'success' &&
      (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    uses: ./.github/workflows/k8s-build-push.yml
    with:
      image: rhesis-polyphemus
      dockerfile: apps/polyphemus/Dockerfile
      context: .
      environment: ${{ inputs.environment || github.event.inputs.environment || 'dev' }}
      tag: ${{ inputs.tag || github.event.inputs.tag }}
    secrets: inherit

  deploy:
    needs: [build, validate-inputs]
    if: needs.validate-inputs.outputs.should_deploy == 'true'
    uses: ./.github/workflows/k8s-deploy.yml
    with:
      environment: ${{ inputs.environment || github.event.inputs.environment || 'dev' }}
      tag: ${{ needs.build.outputs.tag }}
      service: polyphemus
    secrets: inherit
