# Must exist before ExternalSecret (sync wave 5) and the rhesis Helm Application (wave 10).
# CreateNamespace on the rhesis child Application is not run until that Application is applied,
# which is after the ExternalSecret in the same parent sync.
apiVersion: v1
kind: Namespace
metadata:
  name: rhesis
  annotations:
    argocd.argoproj.io/sync-wave: "0"
