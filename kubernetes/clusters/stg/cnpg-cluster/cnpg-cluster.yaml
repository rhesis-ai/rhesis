# CloudNativePG: primary PostgreSQL for staging.
# Operator Application: kubernetes/clusters/stg/cnpg-operator.yaml
# Argo CD Application: kubernetes/clusters/stg/cnpg-cluster-application.yaml (sync-wave 5)
#
# Secrets:
#   - <cluster>-app: owner (rhesis-admin) credentials — DBA / migrations
#   - Declarative roles: rhesis-admin-credentials, rhesis-user-credentials,
#     rhesis-analytics-user-credentials (passwords from GCP Secret Manager via ESO)
#
# BYPASSRLS for rhesis-admin is set via spec.managed.roles (not GRANT).
# As DB owner, rhesis-admin already has full privileges on rhesis-stg-db.
# GRANTs in postInitApplicationSQL are for the non-owner app role rhesis-user only.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: rhesis-stg
  namespace: rhesis
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  description: "Rhesis staging PostgreSQL (CloudNativePG)"
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4-1
  storage:
    size: 20Gi
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 2Gi
  postgresql:
    parameters:
      max_connections: "200"
  managed:
    roles:
      - name: rhesis-admin
        ensure: present
        login: true
        bypassrls: true
        passwordSecret:
          name: rhesis-admin-credentials
      - name: rhesis-user
        ensure: present
        login: true
        bypassrls: false
        passwordSecret:
          name: rhesis-user-credentials
      - name: rhesis-analytics-user
        ensure: present
        login: true
        bypassrls: false
        passwordSecret:
          name: rhesis-analytics-user-credentials
  bootstrap:
    initdb:
      database: rhesis-stg-db
      owner: rhesis-admin
      # Runs as superuser in the postgres DB before the application DB exists.
      # Do not GRANT on rhesis-stg-db here — that DB is created after this phase.
      postInitSQL:
        - CREATE ROLE "rhesis-user" LOGIN;
        - CREATE ROLE "rhesis-analytics-user" LOGIN;
        - CREATE DATABASE "rhesis-analytics-stg-db" OWNER "rhesis-analytics-user";
        - GRANT CONNECT ON DATABASE "rhesis-analytics-stg-db" TO "rhesis-admin";
      # Runs as superuser inside rhesis-stg-db after initdb creates it.
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
        - CREATE EXTENSION IF NOT EXISTS vector;
        - GRANT CONNECT ON DATABASE "rhesis-stg-db" TO "rhesis-user";
        - GRANT USAGE, CREATE ON SCHEMA public TO "rhesis-user";
        - GRANT SELECT, REFERENCES ON ALL TABLES IN SCHEMA public TO "rhesis-user";
        - GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO "rhesis-user";
        - ALTER DEFAULT PRIVILEGES FOR ROLE "rhesis-admin" IN SCHEMA public GRANT SELECT, REFERENCES ON TABLES TO "rhesis-user";
        - ALTER DEFAULT PRIVILEGES FOR ROLE "rhesis-admin" IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO "rhesis-user";
  backup:
    retentionPolicy: 7d
    barmanObjectStore:
      destinationPath: gs://cnpg-backup-rhesis-stg
      serverName: rhesis-stg
      googleCredentials:
        applicationCredentials:
          name: rhesis-stg-cnpg-gcs
          key: key.json
