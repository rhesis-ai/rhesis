apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.55.0
    helm:
      valuesObject:
        deploymentMode: SingleBinary
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            size: PLACEHOLDER
        # Nginx gateway is enabled by default in the Loki chart; SingleBinary still routes
        # traffic through it. Service: <Helm release name>-gateway, port 80 (with release
        # name "loki" this is loki-gateway:80).
        gateway:
          enabled: true
        loki:
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          limits_config:
            retention_period: PLACEHOLDER
          # Multitenancy header (X-Scope-OrgID) is required; Alloy and Grafana use tenant "rhesis"
          auth_enabled: true
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        minio:
          enabled: false
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
