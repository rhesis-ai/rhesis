name: "[Build & Deploy] All for K8s"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to build and push to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        default: ''
        type: string

concurrency:
  group: k8s-deploy-all-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}
      build-matrix: ${{ steps.services.outputs.build-matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Load deploy-all service list
        id: services
        uses: ./.github/actions/k8s-deploy-all-services

      - name: Approve build and push all K8s services
        run: |
          echo "Building and pushing all K8s service images to ${{ github.event.inputs.environment }}"
          echo "Tag override: ${{ github.event.inputs.tag || '(short git SHA)' }}"

      - id: resolve-tag
        name: Resolve image tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(echo "${{ github.sha }}" | cut -c1-8)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

  build:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.gate.outputs.build-matrix) }}
    uses: ./.github/workflows/${{ matrix.workflow }}
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ needs.gate.outputs.tag }}
      deploy: false
    secrets: inherit

  # After all images are pushed, set every deploy-all service's image tag so ArgoCD
  # rolls them together. chatbot is excluded — see .github/k8s/deploy-all-services.json.
  deploy-all:
    needs:
      - gate
      - build
    uses: ./.github/workflows/k8s-deploy.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ needs.gate.outputs.tag }}
      # service left empty → helm-set flags from deploy-all-services.json
    secrets: inherit
