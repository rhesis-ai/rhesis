name: "[Deploy] Backend"

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend.yml'
      - 'sdk/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd
      deploy_only:
        description: 'Skip build and only deploy latest image'
        required: false
        default: false
        type: boolean
      reason:
        description: 'Reason for manual deployment'
        required: false
        type: string
        default: 'Manual deployment'
      preview:
        description: 'Deploy as preview (tagged URL, no live traffic)'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: string
      deploy_only:
        description: 'Skip build and only deploy latest image'
        required: false
        default: false
        type: boolean
      reason:
        description: 'Reason for manual deployment'
        required: false
        type: string
        default: 'Manual deployment'
      preview:
        description: 'Deploy as preview (tagged URL, no live traffic)'
        required: false
        default: false
        type: boolean
      backend_preview_url_override:
        description: 'Override backend URL for preview deployments'
        required: false
        type: string
    outputs:
      backend_preview_url_encoded:
        description: 'The backend preview URL if deployed as preview (base64 encoded)'
        value: ${{ jobs.deploy.outputs.backend_preview_url_encoded }}
      deployed_url_encoded:
        description: 'The deployed service URL (base64 encoded)'
        value: ${{ jobs.deploy.outputs.deployed_url_encoded }}

env:
  SA_KEY_PATH: 'gcp-sa-key.json'

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate environment parameter
        uses: ./.github/actions/validate-environment
        with:
          environment: ${{ github.event.inputs.environment }}

  prepare_build:
    needs: validate-inputs
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ inputs.environment || github.event.inputs.environment || 'dev' }}

    outputs:
      environment: ${{ steps.set_build_metadata.outputs.environment }}
      commit_sha: ${{ steps.set_build_metadata.outputs.commit_sha }}
      git_branch: ${{ steps.set_build_metadata.outputs.git_branch }}
      is_preview: ${{ steps.set_build_metadata.outputs.is_preview }}
      build_tag: ${{ steps.set_build_metadata.outputs.build_tag }}

    steps:
      - name: Set build metadata
        id: set_build_metadata
        run: |
          echo "environment=${{ env.ENVIRONMENT }}" >> $GITHUB_OUTPUT

          # Get commit SHA (short version for URLs)
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT

          # Get branch name
          GIT_BRANCH="${{ github.ref_name }}"
          echo "git_branch=$GIT_BRANCH" >> $GITHUB_OUTPUT

          # Check if this is a preview deployment
          if [ "${{ inputs.preview }}" = "true" ] || [ "${{ github.event.inputs.preview }}" = "true" ]; then
            IS_PREVIEW="true"
          else
            IS_PREVIEW="false"
          fi
          echo "is_preview=$IS_PREVIEW" >> $GITHUB_OUTPUT
          echo "🔍 Preview deployment mode: $IS_PREVIEW"

          # Use one shared tag so parallel image builds publish a matched pair.
          BUILD_TAG="$COMMIT_SHA-$(date +%s)"
          echo "build_tag=$BUILD_TAG" >> $GITHUB_OUTPUT
          echo "Building images with unique tag: $BUILD_TAG"

  build_backend:
    needs: prepare_build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.prepare_build.outputs.environment }}

    env:
      ENVIRONMENT: ${{ needs.prepare_build.outputs.environment }}
      SERVICE: backend
      COMMIT_SHA: ${{ needs.prepare_build.outputs.commit_sha }}
      GIT_BRANCH: ${{ needs.prepare_build.outputs.git_branch }}
      IS_PREVIEW: ${{ needs.prepare_build.outputs.is_preview }}
      BUILD_TAG: ${{ needs.prepare_build.outputs.build_tag }}

    outputs:
      image_name: ${{ steps.setup_service_env.outputs.image-name }}
      service_name: ${{ steps.setup_service_env.outputs.service-name }}
      environment: ${{ needs.prepare_build.outputs.environment }}
      commit_sha: ${{ needs.prepare_build.outputs.commit_sha }}
      git_branch: ${{ needs.prepare_build.outputs.git_branch }}
      is_preview: ${{ needs.prepare_build.outputs.is_preview }}
      build_tag: ${{ needs.prepare_build.outputs.build_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Create and validate service account key file
        id: sa_key
        run: |
          # Write the key to a file, ensuring it's properly quoted
          echo '${{ secrets.GCP_SA_KEY }}' > ${{ env.SA_KEY_PATH }}

          # Validate that the file contains valid JSON
          if ! jq . ${{ env.SA_KEY_PATH }} > /dev/null 2>&1; then
            echo "❌ Error: Service account key is not valid JSON"
            echo "First few characters:"
            head -c 20 ${{ env.SA_KEY_PATH }}
            exit 1
          fi

          echo "✅ Service account key validated as proper JSON"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(realpath ${{ env.SA_KEY_PATH }})" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set environment variables
        run: |
          echo "PROJECT_ID=${{ secrets.PROJECT_ID }}" >> $GITHUB_ENV
          echo "REGION=${{ secrets.REGION || secrets.TF_VAR_REGION || 'us-central1' }}" >> $GITHUB_ENV

      - name: Setup service environment
        id: setup_service_env
        uses: ./.github/actions/setup-service-env
        with:
          environment: ${{ env.ENVIRONMENT }}
          service-type: backend
          project-id: ${{ secrets.PROJECT_ID }}

      - name: Set additional environment variables
        run: |
          echo "CLOUDSQL_INSTANCE=${{ secrets.CLOUDSQL_INSTANCE }}" >> $GITHUB_ENV

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker

      - name: Build Backend Container
        run: |
          # Build without cache to ensure all migration files are always up-to-date
          # Use commit SHA for all builds to avoid GCR/Cloud Run caching issues
          echo "Building backend image with unique tag: $BUILD_TAG"

          # Multi-stage image: apps/backend/Dockerfile (--target backend).
          if [ "$IS_PREVIEW" = "true" ]; then
            # For preview deployments, tag with commit SHA
            docker build --no-cache --pull -t "$IMAGE_NAME:$BUILD_TAG" --target backend -f apps/backend/Dockerfile .
            docker tag "$IMAGE_NAME:$BUILD_TAG" "$IMAGE_NAME:$COMMIT_SHA"
            echo "Built preview image: $IMAGE_NAME:$BUILD_TAG"
          else
            # For regular deployments, use unique tag + latest tag
            docker build --no-cache --pull -t "$IMAGE_NAME:$BUILD_TAG" --target backend -f apps/backend/Dockerfile .
            docker tag "$IMAGE_NAME:$BUILD_TAG" "$IMAGE_NAME:latest"
            echo "Built regular image: $IMAGE_NAME:$BUILD_TAG (tagged as latest)"
          fi

      - name: Push Backend Container
        run: |
          if [ "$IS_PREVIEW" = "true" ]; then
            # For preview deployments, push both unique and commit SHA tagged images
            docker push "$IMAGE_NAME:$BUILD_TAG"
            docker push "$IMAGE_NAME:$COMMIT_SHA"
            echo "Pushed preview images: $IMAGE_NAME:$BUILD_TAG and :$COMMIT_SHA"
          else
            # For regular deployments, push both unique tag and latest
            docker push "$IMAGE_NAME:$BUILD_TAG"
            docker push "$IMAGE_NAME:latest"
            echo "Pushed regular images: $IMAGE_NAME:$BUILD_TAG and :latest"
          fi

  build_migrate:
    needs: prepare_build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.prepare_build.outputs.environment }}

    env:
      ENVIRONMENT: ${{ needs.prepare_build.outputs.environment }}
      SERVICE: backend
      COMMIT_SHA: ${{ needs.prepare_build.outputs.commit_sha }}
      IS_PREVIEW: ${{ needs.prepare_build.outputs.is_preview }}
      BUILD_TAG: ${{ needs.prepare_build.outputs.build_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Create and validate service account key file
        id: sa_key
        run: |
          # Write the key to a file, ensuring it's properly quoted
          echo '${{ secrets.GCP_SA_KEY }}' > ${{ env.SA_KEY_PATH }}

          # Validate that the file contains valid JSON
          if ! jq . ${{ env.SA_KEY_PATH }} > /dev/null 2>&1; then
            echo "❌ Error: Service account key is not valid JSON"
            echo "First few characters:"
            head -c 20 ${{ env.SA_KEY_PATH }}
            exit 1
          fi

          echo "✅ Service account key validated as proper JSON"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(realpath ${{ env.SA_KEY_PATH }})" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set environment variables
        run: |
          echo "PROJECT_ID=${{ secrets.PROJECT_ID }}" >> $GITHUB_ENV
          echo "REGION=${{ secrets.REGION || secrets.TF_VAR_REGION || 'us-central1' }}" >> $GITHUB_ENV

      - name: Setup service environment
        uses: ./.github/actions/setup-service-env
        with:
          environment: ${{ env.ENVIRONMENT }}
          service-type: backend
          project-id: ${{ secrets.PROJECT_ID }}

      - name: Set additional environment variables
        run: |
          echo "CLOUDSQL_INSTANCE=${{ secrets.CLOUDSQL_INSTANCE }}" >> $GITHUB_ENV

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker

      - name: Build Migrate Container
        run: |
          # Build without cache to ensure all migration files are always up-to-date
          # Use commit SHA for all builds to avoid GCR/Cloud Run caching issues
          echo "Building migrate image with unique tag: $BUILD_TAG"

          # Multi-stage image: apps/backend/Dockerfile (--target migrate).
          if [ "$IS_PREVIEW" = "true" ]; then
            # For preview deployments, tag with commit SHA
            docker build --no-cache --pull -t "$IMAGE_NAME-migrate:$BUILD_TAG" --target migrate -f apps/backend/Dockerfile .
            docker tag "$IMAGE_NAME-migrate:$BUILD_TAG" "$IMAGE_NAME-migrate:$COMMIT_SHA"
            echo "Built preview migrate image: $IMAGE_NAME-migrate:$BUILD_TAG"
          else
            # For regular deployments, use unique tag + latest tag
            docker build --no-cache --pull -t "$IMAGE_NAME-migrate:$BUILD_TAG" --target migrate -f apps/backend/Dockerfile .
            docker tag "$IMAGE_NAME-migrate:$BUILD_TAG" "$IMAGE_NAME-migrate:latest"
            echo "Built migrate image: $IMAGE_NAME-migrate:$BUILD_TAG (tagged as latest)"
          fi

      - name: Push Migrate Container
        run: |
          if [ "$IS_PREVIEW" = "true" ]; then
            # For preview deployments, push both unique and commit SHA tagged images
            docker push "$IMAGE_NAME-migrate:$BUILD_TAG"
            docker push "$IMAGE_NAME-migrate:$COMMIT_SHA"
            echo "Pushed preview migrate images: $IMAGE_NAME-migrate:$BUILD_TAG and :$COMMIT_SHA"
          else
            # For regular deployments, push both unique tag and latest
            docker push "$IMAGE_NAME-migrate:$BUILD_TAG"
            docker push "$IMAGE_NAME-migrate:latest"
            echo "Pushed migrate images: $IMAGE_NAME-migrate:$BUILD_TAG and :latest"
          fi

  migrate:
    needs: [validate-inputs, build_backend, build_migrate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.build_backend.outputs.environment || inputs.environment || github.event.inputs.environment }}

    env:
      ENVIRONMENT: ${{ needs.build_backend.outputs.environment || inputs.environment || github.event.inputs.environment }}
      COMMIT_SHA: ${{ needs.build_backend.outputs.commit_sha }}
      IS_PREVIEW: ${{ needs.build_backend.outputs.is_preview }}
      BUILD_TAG: ${{ needs.build_backend.outputs.build_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create and validate service account key file
        id: sa_key
        run: |
          # Write the key to a file, ensuring it's properly quoted
          echo '${{ secrets.GCP_SA_KEY }}' > ${{ env.SA_KEY_PATH }}

          # Validate that the file contains valid JSON
          if ! jq . ${{ env.SA_KEY_PATH }} > /dev/null 2>&1; then
            echo "❌ Error: Service account key is not valid JSON"
            echo "First few characters:"
            head -c 20 ${{ env.SA_KEY_PATH }}
            exit 1
          fi

          echo "✅ Service account key validated as proper JSON"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(realpath ${{ env.SA_KEY_PATH }})" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set environment variables
        run: |
          echo "PROJECT_ID=${{ secrets.PROJECT_ID }}" >> $GITHUB_ENV
          REGION="${{ secrets.REGION || secrets.TF_VAR_REGION || 'us-central1' }}"
          echo "REGION=$REGION" >> $GITHUB_ENV

      - name: Setup service environment
        uses: ./.github/actions/setup-service-env
        with:
          environment: ${{ env.ENVIRONMENT }}
          service-type: backend
          project-id: ${{ secrets.PROJECT_ID }}

      - name: Set additional environment variables
        run: |
          echo "CLOUDSQL_INSTANCE=${{ secrets.CLOUDSQL_INSTANCE }}" >> $GITHUB_ENV

      - name: Run database migrations
        run: |
          echo "🗃️ Running database migrations..."

          # Use the unique BUILD_TAG to ensure we get the freshly built image
          IMAGE_TAG="${{ env.BUILD_TAG }}"

          echo "Using image: ${{ env.IMAGE_NAME }}:$IMAGE_TAG"

          # Stable job name per environment (create-or-update via deploy)
          MIGRATION_JOB_NAME="${SERVICE_NAME}-migrate"
          echo "Deploying/updating Cloud Run Job: $MIGRATION_JOB_NAME"

          # No VPC: migration only needs Cloud SQL via /cloudsql/... socket
          # (attached by --set-cloudsql-instances). Dropping the VPC connector
          # cuts a large chunk of cold-start overhead.
          gcloud run jobs deploy "$MIGRATION_JOB_NAME" \
            --image=${{ env.IMAGE_NAME }}-migrate:$IMAGE_TAG \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --max-retries=0 \
            --task-timeout=10m \
            --memory=1Gi \
            --cpu=1 \
            --set-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.CLOUDSQL_INSTANCE }} \
            --set-env-vars="SQLALCHEMY_DB_DRIVER=${{ secrets.SQLALCHEMY_DB_DRIVER }},SQLALCHEMY_DB_USER=${{ secrets.SQLALCHEMY_DB_USER }},SQLALCHEMY_DB_PASS=${{ secrets.SQLALCHEMY_DB_PASS }},SQLALCHEMY_DB_HOST=${{ secrets.SQLALCHEMY_DB_HOST }},SQLALCHEMY_DB_NAME=${{ secrets.SQLALCHEMY_DB_NAME }}" \
            --args=bash,-c,./migrate.sh

          echo "✅ Migration job definition updated"

          echo "🚀 Executing migration job..."
          gcloud run jobs execute "$MIGRATION_JOB_NAME" \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --wait

          MIGRATION_EXIT_CODE=$?

          if [ $MIGRATION_EXIT_CODE -ne 0 ]; then
            echo "❌ Migration failed with exit code $MIGRATION_EXIT_CODE"
            exit $MIGRATION_EXIT_CODE
          fi

          echo "✅ Database migrations completed successfully"

  deploy:
    needs: [validate-inputs, build_backend, migrate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.build_backend.outputs.environment || inputs.environment || github.event.inputs.environment }}

    env:
      ENVIRONMENT: ${{ needs.build_backend.outputs.environment || inputs.environment || github.event.inputs.environment }}
      COMMIT_SHA: ${{ needs.build_backend.outputs.commit_sha }}
      GIT_BRANCH: ${{ needs.build_backend.outputs.git_branch }}
      IS_PREVIEW: ${{ needs.build_backend.outputs.is_preview }}
      BUILD_TAG: ${{ needs.build_backend.outputs.build_tag }}

    outputs:
      backend_preview_url_encoded: ${{ steps.output_url.outputs.backend_preview_url_encoded }}
      deployed_url_encoded: ${{ steps.output_url.outputs.deployed_url_encoded }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create and validate service account key file
        id: sa_key
        run: |
          # Write the key to a file, ensuring it's properly quoted
          echo '${{ secrets.GCP_SA_KEY }}' > ${{ env.SA_KEY_PATH }}

          # Validate that the file contains valid JSON
          if ! jq . ${{ env.SA_KEY_PATH }} > /dev/null 2>&1; then
            echo "❌ Error: Service account key is not valid JSON"
            echo "First few characters:"
            head -c 20 ${{ env.SA_KEY_PATH }}
            exit 1
          fi

          echo "✅ Service account key validated as proper JSON"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(realpath ${{ env.SA_KEY_PATH }})" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set environment variables
        run: |
          echo "PROJECT_ID=${{ secrets.PROJECT_ID }}" >> $GITHUB_ENV
          REGION="${{ secrets.REGION || secrets.TF_VAR_REGION || 'us-central1' }}"
          echo "REGION=$REGION" >> $GITHUB_ENV

      - name: Setup service environment
        uses: ./.github/actions/setup-service-env
        with:
          environment: ${{ env.ENVIRONMENT }}
          service-type: backend
          project-id: ${{ secrets.PROJECT_ID }}

      - name: Set additional environment variables
        run: |
          echo "CLOUDSQL_INSTANCE=${{ secrets.CLOUDSQL_INSTANCE }}" >> $GITHUB_ENV

      - name: Clean up old revisions
        run: |
          echo "🧹 Cleaning up old revisions to force new instances..."

          # List all revisions and delete those not receiving traffic (keep the latest serving one)
          REVISIONS=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(metadata.name)" \
            --filter="status.conditions.status:True AND traffic:0" \
            --limit=50 || echo "")

          if [ -n "$REVISIONS" ]; then
            echo "Found old revisions to clean up:"
            echo "$REVISIONS"

            for revision in $REVISIONS; do
              echo "Deleting revision: $revision"
              gcloud run revisions delete $revision \
                --region=${{ env.REGION }} \
                --project=${{ env.PROJECT_ID }} \
                --quiet || echo "Failed to delete $revision (may be in use)"
            done

            echo "✅ Cleaned up old revisions"
          else
            echo "No old revisions to clean up"
          fi

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          if [ "${{ env.IS_PREVIEW }}" = "true" ]; then
            # Preview deployment with unique build tag
            IMAGE_TAG="${{ env.BUILD_TAG }}"
            echo "🚀 Deploying preview revision with build tag: $IMAGE_TAG"
            echo "Image: ${{ env.IMAGE_NAME }}:$IMAGE_TAG"

            # Generate the Cloud Run URL for this preview (or use override)
            if [ -n "${{ inputs.backend_preview_url_override }}" ]; then
              PREVIEW_CLOUD_RUN_URL="${{ inputs.backend_preview_url_override }}"
              echo "🔗 Using provided backend URL override: $PREVIEW_CLOUD_RUN_URL"
            else
              # We'll set this after the service is tagged with the correct URL
              PREVIEW_CLOUD_RUN_URL="PLACEHOLDER_WILL_BE_SET_AFTER_TAGGING"
              echo "🌐 Preview URL will be fetched after deployment and tagging"
            fi

            gcloud run deploy ${{ env.SERVICE_NAME }} \
              --image=${{ env.IMAGE_NAME }}:$IMAGE_TAG \
              --project=${{ env.PROJECT_ID }} \
              --vpc-connector=${{ secrets.VPC_CONNECTOR_NAME }} \
              --vpc-egress=private-ranges-only \
              --region=${{ env.REGION }} \
              --platform=managed \
              --allow-unauthenticated \
              --port=8080 \
              --no-traffic \
              --revision-suffix=${{ env.COMMIT_SHA }} \
              --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.CLOUDSQL_INSTANCE }} \
              --set-env-vars="$(cat <<EOF
          SQLALCHEMY_DATABASE_URL=${{ secrets.SQLALCHEMY_DATABASE_URL }},
          SQLALCHEMY_DB_MODE=${{ secrets.SQLALCHEMY_DB_MODE }},
          SQLALCHEMY_DB_DRIVER=${{ secrets.SQLALCHEMY_DB_DRIVER }},
          SQLALCHEMY_DB_USER=${{ secrets.SQLALCHEMY_DB_USER }},
          SQLALCHEMY_DB_PASS=${{ secrets.SQLALCHEMY_DB_PASS }},
          SQLALCHEMY_DB_HOST=${{ secrets.SQLALCHEMY_DB_HOST }},
          SQLALCHEMY_DB_NAME=${{ secrets.SQLALCHEMY_DB_NAME }},
          DB_ENCRYPTION_KEY=${{ secrets.DB_ENCRYPTION_KEY }},
          LOG_LEVEL=${{ secrets.LOG_LEVEL }},
          DEMO_USER_EMAIL=${{ secrets.DEMO_USER_EMAIL }},
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }},
          SESSION_SECRET_KEY=${{ secrets.SESSION_SECRET_KEY }},
          JWT_ALGORITHM=${{ secrets.JWT_ALGORITHM }},
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.JWT_ACCESS_TOKEN_EXPIRE_MINUTES }},
          FRONTEND_URL=${{ secrets.FRONTEND_URL }},
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},
          GH_CLIENT_ID=${{ secrets.GH_CLIENT_ID }},
          GH_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }},
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},
          GEMINI_MODEL_NAME=${{ secrets.GEMINI_MODEL_NAME }},
          DEFAULT_GENERATION_MODEL=${{ secrets.DEFAULT_GENERATION_MODEL }},
          DEFAULT_EVALUATION_MODEL=${{ secrets.DEFAULT_EVALUATION_MODEL }},
          DEFAULT_EXECUTION_MODEL=${{ secrets.DEFAULT_EXECUTION_MODEL }},
          DEFAULT_EMBEDDING_MODEL=${{ secrets.DEFAULT_EMBEDDING_MODEL }},
          GOOGLE_APPLICATION_CREDENTIALS=${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }},
          VERTEX_AI_LOCATION=${{ secrets.VERTEX_AI_LOCATION }},
          VERTEX_AI_PROJECT=${{ secrets.VERTEX_AI_PROJECT }},
          CHATBOT_API_KEY=${{ secrets.CHATBOT_API_KEY }},
          PERSPECTIVE_API_KEY=${{ secrets.PERSPECTIVE_API_KEY }},
          RHESIS_BASE_URL=$PREVIEW_CLOUD_RUN_URL,
          BACKEND_URL=$PREVIEW_CLOUD_RUN_URL,
          BACKEND_ENV=${{ secrets.BACKEND_ENV }},
          SMTP_HOST=${{ secrets.SMTP_HOST }},
          SMTP_PORT=${{ secrets.SMTP_PORT }},
          SMTP_USER=${{ secrets.SMTP_USER }},
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }},
          SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }},
          SENDGRID_DAY_1_EMAIL_TEMPLATE_ID=${{ secrets.SENDGRID_DAY_1_EMAIL_TEMPLATE_ID }},
          SENDGRID_DAY_2_EMAIL_TEMPLATE_ID=${{ secrets.SENDGRID_DAY_2_EMAIL_TEMPLATE_ID }},
          SENDGRID_DAY_3_EMAIL_TEMPLATE_ID=${{ secrets.SENDGRID_DAY_3_EMAIL_TEMPLATE_ID }},
          FROM_EMAIL=${{ secrets.FROM_EMAIL }},
          AGENT_EMAIL_BCC=${{ secrets.AGENT_EMAIL_BCC }},
          WELCOME_CALENDAR_LINK=${{ secrets.WELCOME_CALENDAR_LINK }},
          WELCOME_FROM_EMAIL=${{ secrets.WELCOME_FROM_EMAIL }},
          BROKER_URL=${{ secrets.BROKER_URL }},
          CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }},
          STORAGE_SERVICE_URI=${{ secrets.STORAGE_SERVICE_URI }},
          STORAGE_SERVICE_ACCOUNT_KEY=${{ secrets.STORAGE_SERVICE_ACCOUNT_KEY }},
          LOCAL_STORAGE_PATH=${{ secrets.LOCAL_STORAGE_PATH }},
          OTEL_EXPORTER_OTLP_ENDPOINT=${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }},
          OTEL_SERVICE_NAME=${{ secrets.OTEL_SERVICE_NAME || 'rhesis-backend' }},
          OTEL_DEPLOYMENT_TYPE=${{ secrets.OTEL_DEPLOYMENT_TYPE || 'cloud' }},
          OTEL_RHESIS_TELEMETRY_ENABLED=${{ secrets.OTEL_RHESIS_TELEMETRY_ENABLED || 'true' }},
          RHESIS_CONNECTOR_DISABLED=${{ secrets.RHESIS_CONNECTOR_DISABLED || 'true' }},
          DEFAULT_POLYPHEMUS_URL=${{ secrets.DEFAULT_POLYPHEMUS_URL }},
          GIT_BRANCH=${{ env.GIT_BRANCH }},
          GIT_COMMIT=${{ env.COMMIT_SHA }},
          SKIP_MIGRATIONS=true
          EOF
          )"

            echo "✅ Preview revision deployed successfully"
          else
            # Regular deployment with unique build tag
            IMAGE_TAG="${{ env.BUILD_TAG }}"
            echo "🚀 Deploying regular revision"
            echo "Image: ${{ env.IMAGE_NAME }}:$IMAGE_TAG"
