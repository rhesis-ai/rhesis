apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-ingress-nginx-external
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rhesis-ai/rhesis.git
    targetRevision: fix/deployment-automation-test
    path: kubernetes/clusters/dev/ingress-nginx-external
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
