apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stg-cnpg-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/rhesis-ai/rhesis.git
    targetRevision: release/vX.X.X
    path: kubernetes/clusters/stg/cnpg-cluster
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
