{{- if .Values.frontend.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: frontend
    tier: frontend
    {{- include "rhesis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
      tier: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      {{- include "rhesis.podSecurityContext" (dict "Values" .Values "component" .Values.frontend) | nindent 6 }}
      containers:
        - name: frontend
          image: {{ include "rhesis.image" (dict "imageValues" .Values.frontend "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy | default .Values.global.imagePullPolicy }}
          {{- include "rhesis.containerSecurityContext" (dict "Values" .Values "component" .Values.frontend) | nindent 10 }}
          ports:
            - containerPort: {{ .Values.frontend.service.targetPort }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "rhesis.fullname" . }}-config
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- with .Values.frontend.env }}
          env:
            {{- range . }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.targetPort }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
{{- end }}
