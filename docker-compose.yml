# Host-facing access. Internal container ports stay constant (backend 8080,
# frontend 3000). Two independent layers:
#   BACKEND_PORT / FRONTEND_PORT — host bind port in `host:container` mappings.
#   *_URL  — public address the browser/backend use for links, redirects, cookies.
# On localhost they happen to match; in self-hosting the public URL (domain /
# reverse proxy) is unrelated to the bind port, so neither derives from the other.
x-host:
  backend_port:  &backend_port  ${BACKEND_PORT:-8080}
  frontend_port: &frontend_port ${FRONTEND_PORT:-3000}
  api_base_url:  &api_base_url  ${API_BASE_URL:-http://localhost:8080}
  frontend_url:  &frontend_url  ${FRONTEND_URL:-http://localhost:3000}

# Object storage configuration (local dev defaults to bind-mounted /app/storage)
x-common-storage: &common-storage
  STORAGE_SERVICE_URI: ${STORAGE_SERVICE_URI:-file:///app/storage}
  STORAGE_SERVICE_ACCOUNT_KEY: ${STORAGE_SERVICE_ACCOUNT_KEY:-}
  LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/tmp/rhesis-files}

# Native authentication configuration (provider-agnostic)
x-common-auth: &common-auth
  # Email/password authentication
  AUTH_EMAIL_PASSWORD_ENABLED: ${AUTH_EMAIL_PASSWORD_ENABLED:-true}
  AUTH_REGISTRATION_ENABLED: ${AUTH_REGISTRATION_ENABLED:-true}
  # Google OAuth (optional - leave empty to disable)
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  # GitHub OAuth (optional - leave empty to disable)
  GH_CLIENT_ID: ${GH_CLIENT_ID:-}
  GH_CLIENT_SECRET: ${GH_CLIENT_SECRET:-}
  SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:?SESSION_SECRET_KEY is required, no safe default}


x-common-smtp: &common-smtp
  SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-user@example.com}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-your-smtp-password}
  FROM_EMAIL: ${FROM_EMAIL:-noreply@example.com}

x-common-jwt: &common-jwt
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required, no safe default}

x-common-environment: &common-environment
  BACKEND_ENV: local
  FRONTEND_ENV: local
  WORKER_ENV: local
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  QUICK_START: ${QUICK_START:-false}

x-rhesis-config: &rhesis-config
  API_BASE_URL: *api_base_url
  RHESIS_BASE_URL: https://api.rhesis.ai
  RHESIS_API_KEY: ${RHESIS_API_KEY:-your-rhesis-api-key}
  RHESIS_CONNECTOR_DISABLED: true
  FRONTEND_URL: *frontend_url
  BACKEND_URL: http://backend:8080
  DEFAULT_GENERATION_MODEL: ${DEFAULT_GENERATION_MODEL:-rhesis/rhesis-default}
  DEFAULT_EVALUATION_MODEL: ${DEFAULT_EVALUATION_MODEL:-rhesis/rhesis-default}
  DEFAULT_EXECUTION_MODEL: ${DEFAULT_EXECUTION_MODEL:-rhesis/rhesis-default}
  DEFAULT_EMBEDDING_MODEL: ${DEFAULT_EMBEDDING_MODEL:-rhesis/rhesis-embedding}

x-telemetry-config: &telemetry-config
  OTEL_RHESIS_TELEMETRY_ENABLED: ${OTEL_RHESIS_TELEMETRY_ENABLED:-true}  # Self-hosted: opt-out via env var

x-nextjs-frontend: &nextjs-frontend
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required, no safe default}
  NEXT_TELEMETRY_DISABLED: 1


services:
  # PostgreSQL Database (built-in). Credentials below are fixed by
  # apps/backend/src/rhesis/backend/alembic/create_user.sql — do not change
  # them here. To use a different database (managed Postgres, different
  # credentials, etc.), set DB_HOST/DB_PORT/DB_NAME/APP_DB_USER/APP_DB_PASS
  # in your .env file to point the backend/worker at it instead; this
  # built-in container will simply go unused.
  postgres:
    image: mirror.gcr.io/pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rhesis-db
      POSTGRES_USER: rhesis-user
      POSTGRES_PASSWORD: rhesis-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/src/rhesis/backend/alembic/create_user.sql:/docker-entrypoint-initdb.d/01-create-user.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhesis-user -d rhesis-db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rhesis-network

   # Redis for Celery (built-in). Password below is fixed — do not change it
  # here. To use an external Redis, set BROKER_URL/CELERY_RESULT_BACKEND in
  # your .env file to point the backend/worker at it instead; this built-in
  # container will simply go unused.
  redis:
    image: mirror.gcr.io/redis:7-alpine
    command: redis-server --requirepass rhesis-redis-pass
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "rhesis-redis-pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rhesis-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: backend
    environment:
      <<: [*common-auth, *common-smtp, *common-jwt, *common-environment, *rhesis-config, *telemetry-config, *common-storage]
      # DB/Redis default to the built-in postgres/redis services above; set
      # these in your .env file to point at an external database or Redis.
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-rhesis-db}
      APP_DB_USER: ${APP_DB_USER:-rhesis-user}
      APP_DB_PASS: ${APP_DB_PASS:-rhesis-password}
      ADMIN_DB_USER: ${ADMIN_DB_USER:-}
      ADMIN_DB_PASS: ${ADMIN_DB_PASS:-}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY:?DB_ENCRYPTION_KEY is required, no safe default}
      BROKER_URL: ${BROKER_URL:-redis://:rhesis-redis-pass@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:rhesis-redis-pass@redis:6379/1}
      OTEL_EXPORTER_OTLP_ENDPOINT: https://telemetry.rhesis.ai
      OTEL_SERVICE_NAME: rhesis
      OTEL_DEPLOYMENT_TYPE: self-hosted
    volumes:
      - rhesis-storage:/app/storage
    ports:
      - target: 8080
        published: *backend_port
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rhesis-network

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: worker
    environment:
      <<: [*common-auth,  *common-smtp, *common-jwt, *common-environment, *rhesis-config, *common-storage]
      # DB/Redis default to the built-in postgres/redis services above; set
      # these in your .env file to point at an external database or Redis.
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-rhesis-db}
      APP_DB_USER: ${APP_DB_USER:-rhesis-user}
      APP_DB_PASS: ${APP_DB_PASS:-rhesis-password}
      ADMIN_DB_USER: ${ADMIN_DB_USER:-}
      ADMIN_DB_PASS: ${ADMIN_DB_PASS:-}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY:?DB_ENCRYPTION_KEY is required, no safe default}
      BROKER_URL: ${BROKER_URL:-redis://:rhesis-redis-pass@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:rhesis-redis-pass@redis:6379/1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-8}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-4}
      CELERY_WORKER_LOGLEVEL: ${CELERY_WORKER_LOGLEVEL:-INFO}
      ENABLE_FLOWER: no
    volumes:
      - rhesis-storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rhesis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/basic"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        FRONTEND_ENV: local
    environment:
      <<: [*nextjs-frontend, *common-environment, *rhesis-config]
    ports:
      - target: 3000
        published: *frontend_port
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rhesis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Documentation
  docs:
    build:
      context: ./docs
      dockerfile: src/Dockerfile
      args:
        ROBOTS_NOINDEX: ${ROBOTS_NOINDEX:-false}
    environment:
      <<: [*common-environment]
      PORT: 3001
      ROBOTS_NOINDEX: ${ROBOTS_NOINDEX:-false}
    ports:
      - "3001:3001"
    networks:
      - rhesis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rhesis-storage:
    driver: local

networks:
  rhesis-network:
    driver: bridge
