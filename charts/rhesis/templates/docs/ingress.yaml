{{- if and .Values.docs.enabled .Values.docs.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docs
  namespace: {{ .Release.Namespace }}
  labels:
    app: docs
    tier: docs
    {{- include "rhesis.labels" . | nindent 4 }}
  {{- $ann := .Values.docs.ingress.annotations }}
  {{- if not .Values.docs.ingress.tlsEnabled }}
  {{- $ann = merge (dict "nginx.ingress.kubernetes.io/ssl-redirect" "false") (omit $ann "cert-manager.io/cluster-issuer") }}
  {{- end }}
  {{- with $ann }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.docs.ingress.className }}
  rules:
    - host: {{ .Values.docs.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: {{ .Values.docs.service.port }}
  {{- if .Values.docs.ingress.tlsEnabled }}
  tls:
    - hosts:
        - {{ .Values.docs.ingress.host | quote }}
      secretName: {{ .Values.docs.ingress.tlsSecretName }}
  {{- end }}
{{- end }}
