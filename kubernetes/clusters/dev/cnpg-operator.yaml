apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-cnpg-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rhesis-ai/rhesis.git
    targetRevision: feat/deploy-rhesis-app-into-gke
    path: kubernetes/clusters/dev/cnpg-system
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
