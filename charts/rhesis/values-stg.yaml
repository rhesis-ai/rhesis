# Staging environment overrides — scaffold, fill in before deploying to stg.

global:
  registry: "europe-west4-docker.pkg.dev/<stg-project-id>/rhesis"
  imagePullPolicy: Always
  imageTag: "latest"

config:
  environment: "staging"
  logLevel: "INFO"
  nextPublicApiBaseUrl: "https://stg-api.rhesis.ai"
  nextPublicAppUrl: "https://stg-app.rhesis.ai"
  nextauthUrl: "https://stg-app.rhesis.ai"
  rhesisBaseUrl: "https://stg-api.rhesis.ai"
  frontendUrl: "https://stg-app.rhesis.ai"
  backendUrl: "http://backend:8080"
  vertexAiProject: "<stg-project-id>"
  azureOpenAiApiVersion: "2024-02-01"

backend:
  ingress:
    enabled: true
    host: "stg-api.rhesis.ai"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

frontend:
  ingress:
    enabled: true
    host: "stg-app.rhesis.ai"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

docs:
  ingress:
    enabled: true
    host: "stg-docs.rhesis.ai"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

# PostgreSQL disabled for stg — use CNPG Cluster or external DB via ExternalSecret
postgresql:
  enabled: false

externalDatabase:
  host: ""   # resolved from ExternalSecret / CNPG service name

valkey:
  enabled: true
  auth:
    enabled: true
    existingSecret: "rhesis-app-secrets"
    existingSecretPasswordKey: "REDIS_PASSWORD"
