[project]
name = "rhesis"
dynamic = ["version"]
description = "Rhesis - Testing and validation platform for LLM applications"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "Engineering Team", email = "engineering@rhesis.ai" },
    { name = "Harry Cruz", email = "harry@rhesis.ai" },
    { name = "Nicolai Bohn", email = "nicolai@rhesis.ai" },
]
keywords = [
    "llm",
    "testing",
    "ai",
    "machine-learning",
    "validation",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "pydantic>=2.0.0",
    "requests>=2.31.0",
    "tenacity>=8.2.0",
]

[project.license]
text = "MIT"

[project.urls]
Homepage = "https://rhesis.ai"
Repository = "https://github.com/rhesis-ai/rhesis"
Documentation = "https://docs.rhesis.ai"
"Bug Tracker" = "https://github.com/rhesis-ai/rhesis/issues"

[project.optional-dependencies]
telemetry = [
    "opentelemetry-api>=1.32.1",
    "opentelemetry-sdk>=1.32.1",
    "opentelemetry-exporter-otlp-proto-http>=1.32.1",
]
sdk = ["rhesis-sdk"]
all = [
    "rhesis[telemetry,sdk]",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "../../sdk/pyproject.toml"
pattern = '''version\s*=\s*["'](?P<version>[^"']+)["']'''

[tool.hatch.build.targets.wheel]
packages = ["src/rhesis"]

[tool.uv]
exclude-newer = "1 week"
# Force minimum versions for transitive dependencies with security advisories
constraint-dependencies = [
    "pyasn1>=0.6.3",
    "orjson>=3.11.7",
    "tornado>=6.5.5",
    "litellm>=1.83.10",
    "lxml>=6.1.0",
    "langchain-text-splitters>=1.1.2",
    "langsmith>=0.8.0",
    "langchain-openai>=1.1.14",
    "langchain-core>=1.3.3",
    "langchain-classic>=1.0.7",
    "urllib3>=2.7.0",
    "idna>=3.15",
    "python-multipart>=0.0.27",
    "pytest>=9.0.3",
    "cryptography>=46.0.7",
]

