apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: cnpg-system
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    # Overridden per cluster in clusters/<env>/cnpg-system/cnpg-operator-helm-chart.yaml
    targetRevision: 0.27.1
    helm:
      valuesObject:
        monitoring:
          podMonitorEnabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  ignoreDifferences:
    # CRDs are defaulted/mutated by the API server; diff noise only.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/managedFields
        - /status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      # CNPG CRDs (especially poolers.postgresql.cnpg.io) exceed client-side apply
      # annotation limits; SSA is required for Argo CD. See cloudnative-pg/charts#544.
      - ServerSideApply=true
