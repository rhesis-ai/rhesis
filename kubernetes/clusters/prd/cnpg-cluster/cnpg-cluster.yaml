# CloudNativePG: HA PostgreSQL for production.
# Operator Application: kubernetes/clusters/prd/cnpg-operator.yaml
# Argo CD Application: kubernetes/clusters/prd/cnpg-cluster-application.yaml (sync-wave 5)
#
# Auth: Workload Identity (gkeEnvironment: true). No JSON key — CNPG pods impersonate
# GSA rhesis-cnpg-bk-prd@rhesis-prd.iam.gserviceaccount.com via the KSA annotation below.
# Terraform module cnpg_barman_prd creates the WI IAM binding.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: rhesis-prd
  namespace: rhesis
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  description: "Rhesis production PostgreSQL (CloudNativePG)"
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.4-1
  storage:
    size: 100Gi
  # Annotate the CNPG-managed KSA so GKE Workload Identity links it to the GSA.
  serviceAccountTemplate:
    metadata:
      annotations:
        iam.gke.io/gcp-service-account: rhesis-cnpg-bk-prd@rhesis-prd.iam.gserviceaccount.com
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 4Gi
      # cpu limit intentionally omitted: databases benefit from absorbing CPU bursts.
      # cpu request above ensures correct scheduler placement.
  postgresql:
    parameters:
      max_connections: "300"
  primaryUpdateStrategy: unsupervised
  managed:
    roles:
      - name: rhesis-admin
        ensure: present
        login: true
        bypassrls: true
        passwordSecret:
          name: rhesis-admin-credentials
      - name: rhesis-user
        ensure: present
        login: true
        bypassrls: false
        passwordSecret:
          name: rhesis-user-credentials
      - name: rhesis-analytics-user
        ensure: present
        login: true
        bypassrls: false
        passwordSecret:
          name: rhesis-analytics-user-credentials
  bootstrap:
    initdb:
      database: rhesis-prd-db
      owner: rhesis-admin
      # spec.managed.roles above is the sole owner of role creation.
      # CREATE ROLE is intentionally absent here to avoid a race with managed.roles
      # reconciliation (second CREATE would fail with "role already exists").
      postInitSQL:
        - CREATE DATABASE "rhesis-analytics-prd-db" OWNER "rhesis-analytics-user";
        - GRANT CONNECT ON DATABASE "rhesis-analytics-prd-db" TO "rhesis-admin";
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
        - CREATE EXTENSION IF NOT EXISTS vector;
        - GRANT CONNECT ON DATABASE "rhesis-prd-db" TO "rhesis-user";
        - GRANT USAGE ON SCHEMA public TO "rhesis-user";
        - GRANT SELECT, INSERT, UPDATE, DELETE, REFERENCES ON ALL TABLES IN SCHEMA public TO "rhesis-user";
        - GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO "rhesis-user";
        - ALTER DEFAULT PRIVILEGES FOR ROLE "rhesis-admin" IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE, REFERENCES ON TABLES TO "rhesis-user";
        - ALTER DEFAULT PRIVILEGES FOR ROLE "rhesis-admin" IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO "rhesis-user";
  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      destinationPath: gs://cnpg-backup-rhesis-prd
      serverName: rhesis-prd
      googleCredentials:
        gkeEnvironment: true
