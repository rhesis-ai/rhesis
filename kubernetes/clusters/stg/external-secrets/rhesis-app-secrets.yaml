# Lives under external-secrets/ so the stg-external-secrets Argo CD Application
# (same sync tree as the ESO Helm chart) applies it after the ExternalSecret CRD exists.
#
# ExternalSecret: syncs all sensitive Rhesis application credentials from
# GCP Secret Manager into a single Kubernetes Secret named "rhesis-app-secrets".
#
# This secret is referenced by:
#   - All application Deployments (via secretRef envFrom) — except DB user/password, which
#     come from CNPG declarative role secret rhesis-user-credentials (Helm values.database).
#     Includes otel-collector and telemetry-processor (OTEL_API_KEY, ANALYTICS_*).
#   - Bitnami Valkey subchart (auth.existingSecret)
#
# Each remoteRef.key must exist in Secret Manager. Create with:
#   gcloud secrets create <remoteRef.key> --replication-policy=automatic --data-file=-
# Grant ESO:
#   gcloud secrets add-iam-policy-binding <key> \
#     --member="serviceAccount:eso-stg@rhesis-stg-494712.iam.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor"
#
# Values can be bootstrapped from infrastructure/config or Secret Manager (STG_* exports).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rhesis-app-secrets
  namespace: rhesis
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: rhesis-app-secrets
    creationPolicy: Owner
  data:
    # -----------------------------------------------------------------------
    # Database (user/password/URL from CNPG rhesis-user-credentials, not from GSM)
    # -----------------------------------------------------------------------
    - secretKey: DB_ENCRYPTION_KEY
      remoteRef:
        key: stg-rhesis-db-encryption-key

    # SSO Encryption Key (required to enable per-organization SSO/OIDC).
    # If unset, the SSO feature is disabled at runtime.
    - secretKey: SSO_ENCRYPTION_KEY
      remoteRef:
        key: stg-rhesis-sso-encryption-key

    - secretKey: SESSION_SECRET_KEY
      remoteRef:
        key: stg-rhesis-session-secret-key

    - secretKey: RHESIS_ADMIN_PASSWORD
      remoteRef:
        key: stg-rhesis-admin-password
    - secretKey: RHESIS_USER_PASSWORD
      remoteRef:
        key: stg-rhesis-user-password
    # -----------------------------------------------------------------------
    # Redis / Valkey
    # -----------------------------------------------------------------------
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: stg-rhesis-redis-pass

    # Optional external Redis/Memorystore (in-cluster chart may override for workers)
    - secretKey: BROKER_URL
      remoteRef:
        key: stg-rhesis-broker-url

    - secretKey: CELERY_RESULT_BACKEND
      remoteRef:
        key: stg-rhesis-celery-result-backend

    # -----------------------------------------------------------------------
    # JWT
    # -----------------------------------------------------------------------
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: stg-rhesis-jwt-secret-key

    - secretKey: AUDIT_HASH_KEY
      remoteRef:
        key: stg-rhesis-audit-hash-key

    - secretKey: AUTH_SECRET
      remoteRef:
        key: stg-rhesis-auth-secret

    # -----------------------------------------------------------------------
    # AI model API keys
    # -----------------------------------------------------------------------
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: stg-rhesis-gemini-api-key

    - secretKey: GOOGLE_API_KEY
      remoteRef:
        key: stg-rhesis-google-api-key

    - secretKey: PERSPECTIVE_API_KEY
      remoteRef:
        key: stg-rhesis-perspective-api-key

    - secretKey: CHATBOT_API_KEY
      remoteRef:
        key: stg-rhesis-chatbot-api-key

    - secretKey: RHESIS_API_KEY
      remoteRef:
        key: stg-rhesis-rhesis-api-key

    # -----------------------------------------------------------------------
    # GCS and GCP service account JSON (per-feature keys)
    # -----------------------------------------------------------------------
    - secretKey: GOOGLE_APPLICATION_CREDENTIALS
      remoteRef:
        key: stg-rhesis-google-application-credentials

    - secretKey: STORAGE_SERVICE_ACCOUNT_KEY
      remoteRef:
        key: stg-rhesis-storage-service-account-key

    # gs://... — must match Terraform GCS file bucket (e.g. sources-rhesis-dev)
    - secretKey: STORAGE_SERVICE_URI
      remoteRef:
        key: stg-rhesis-storage-service-uri

    - secretKey: GCP_SERVICE_ACCOUNT
      remoteRef:
        key: stg-rhesis-gcp-service-account

    - secretKey: VERTEX_AI_LOCATION
      remoteRef:
        key: stg-rhesis-vertex-ai-location

    - secretKey: VERTEX_AI_PROJECT
      remoteRef:
        key: stg-rhesis-vertex-ai-project

    # -----------------------------------------------------------------------
    # GitHub OAuth (if used)
    # -----------------------------------------------------------------------
    - secretKey: GH_CLIENT_ID
      remoteRef:
        key: stg-rhesis-gh-client-id

    - secretKey: GH_CLIENT_SECRET
      remoteRef:
        key: stg-rhesis-gh-client-secret

    # -----------------------------------------------------------------------
    # SMTP & email
    # -----------------------------------------------------------------------
    - secretKey: SMTP_HOST
      remoteRef:
        key: stg-rhesis-smtp-host

    - secretKey: SMTP_USER
      remoteRef:
        key: stg-rhesis-smtp-user

    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: stg-rhesis-smtp-password

    - secretKey: FROM_EMAIL
      remoteRef:
        key: stg-rhesis-from-email

    - secretKey: AGENT_EMAIL_BCC
      remoteRef:
        key: stg-rhesis-agent-email-bcc

    - secretKey: WELCOME_FROM_EMAIL
      remoteRef:
        key: stg-rhesis-welcome-from-email

    - secretKey: WELCOME_CALENDAR_LINK
      remoteRef:
        key: stg-rhesis-welcome-calendar-link

    - secretKey: SENDGRID_API_KEY
      remoteRef:
        key: stg-rhesis-sendgrid-api-key

    - secretKey: SENDGRID_DAY_1_EMAIL_TEMPLATE_ID
      remoteRef:
        key: stg-rhesis-sendgrid-day-1-email-template-id

    - secretKey: SENDGRID_DAY_2_EMAIL_TEMPLATE_ID
      remoteRef:
        key: stg-rhesis-sendgrid-day-2-email-template-id

    - secretKey: SENDGRID_DAY_3_EMAIL_TEMPLATE_ID
      remoteRef:
        key: stg-rhesis-sendgrid-day-3-email-template-id

    # -----------------------------------------------------------------------
    # Frontend / NextAuth
    # -----------------------------------------------------------------------
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: stg-rhesis-nextauth-secret

    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: stg-rhesis-google-client-id

    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: stg-rhesis-google-client-secret

    # -----------------------------------------------------------------------
    # Analytics DB (telemetry)
    # -----------------------------------------------------------------------
    - secretKey: ANALYTICS_DB_USER
      remoteRef:
        key: stg-rhesis-analytics-db-user

    - secretKey: ANALYTICS_DB_PASS
      remoteRef:
        key: stg-rhesis-analytics-db-pass

    - secretKey: ANALYTICS_DB_HOST
      remoteRef:
        key: stg-rhesis-analytics-db-host

    - secretKey: ANALYTICS_DB_PORT
      remoteRef:
        key: stg-rhesis-analytics-db-port

    - secretKey: ANALYTICS_DB_NAME
      remoteRef:
        key: stg-rhesis-analytics-db-name

    - secretKey: ANALYTICS_DB_DRIVER
      remoteRef:
        key: stg-rhesis-analytics-db-driver

    - secretKey: ANALYTICS_DATABASE_URL
      remoteRef:
        key: stg-rhesis-analytics-database-url

    - secretKey: ANALYTICS_USER_PASSWORD
      remoteRef:
        key: stg-rhesis-analytics-user-password




    # -----------------------------------------------------------------------
    # OpenTelemetry
    # -----------------------------------------------------------------------
    - secretKey: OTEL_API_KEY
      remoteRef:
        key: stg-rhesis-otel-api-key

    # Optional: if backend is configured to read OTLP endpoint as secret
    - secretKey: OTEL_EXPORTER_OTLP_ENDPOINT
      remoteRef:
        key: stg-rhesis-otel-exporter-otlp-endpoint

    # Telemetry processor gRPC endpoint consumed by otel-collector.
    # For in-cluster: telemetry-processor:4317 (also set via ConfigMap).
    # For external/cross-env: stg-telemetry.rhesis.ai:443 (with OTEL_INSECURE=false).
    # Secret value overrides the ConfigMap value when present.
    - secretKey: OTEL_PROCESSOR_ENDPOINT
      remoteRef:
        key: stg-rhesis-otel-processor-endpoint

    # -----------------------------------------------------------------------
    # Polyphemus (optional feature)
    # -----------------------------------------------------------------------
    - secretKey: DEFAULT_POLYPHEMUS_URL
      remoteRef:
        key: stg-rhesis-default-polyphemus-url

    - secretKey: POLYPHEMUS_DEFAULT_MODEL
      remoteRef:
        key: stg-rhesis-polyphemus-default-model

    - secretKey: POLYPHEMUS_MODEL_BUCKET
      remoteRef:
        key: stg-rhesis-polyphemus-model-bucket

    - secretKey: POLYPHEMUS_MODEL_PATH
      remoteRef:
        key: stg-rhesis-polyphemus-model-path

##--------------------------------------------------------
### Grafana credentials
##--------------------------------------------------------
    - secretKey: GF_SECURITY_ADMIN_PASSWORD
      remoteRef:
        key: grafana-admin-password

    - secretKey: GF_SECURITY_ADMIN_USER
      remoteRef:
        key: grafana-admin-user

    - secretKey: GF_SECURITY_ADMIN_USER_PASSWORD
      remoteRef:
        key: grafana-datasource-password

##--------------------------------------------------------
## Rhesis license
##--------------------------------------------------------
    - secretKey: RHESIS_LICENSE_PRIVATE_KEY
      remoteRef:
        key: stg-rhesis-rhesis-license-private-key

    - secretKey: RHESIS_LICENSE_KID
      remoteRef:
        key: stg-rhesis-rhesis-license-kid
