# Explicit list of resources synced by stg-base Application.
# Add new components here so the sync contract is auditable.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - argocd/argocd-application.yaml
  - argocd/argocd-ingress.yaml
  - external-secrets.yaml
  - external-dns.yaml
  - cert-manager.yaml
  - ingress-nginx-external.yaml
  - ingress-nginx-internal.yaml
  - internal-dns.yaml
  - cluster-dns-application.yaml
  - cnpg-operator.yaml
  # Monitoring stack (sync-wave on each wrapper defers grafana-resources until CRDs exist)
  - grafana-operator.yaml
  - kube-prometheus-stack.yaml
  - loki.yaml
  - alloy.yaml
  - grafana-resources.yaml
  - rhesis/namespace.yaml
  # The DB cluster is deployed via its own Application so it waits for the operator's CRDs
  - cnpg-cluster-application.yaml
  # rhesis-app-secrets: see clusters/stg/external-secrets/rhesis-app-secrets.yaml
  - rhesis/rhesis-application.yaml
  # ARC self-hosted runner: gives deploy jobs VPC-internal access to ArgoCD
  - arc.yaml
