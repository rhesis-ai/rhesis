name: "[Deploy] K8s via ArgoCD (reusable)"

# Uses the ArgoCD CLI to set the image tag parameter on the ArgoCD Application
# and trigger an immediate sync — no git commit required.
#
# All-services deploy:  leave `service` empty → sets global.imageTag
# Per-service deploy:   set `service` to the values key (e.g. backend, workers)
#                       → sets <service>.image.tag only
#
# Required secrets (add in GitHub → Settings → Secrets, one set per environment):
#   ARGOCD_SERVER_DEV / ARGOCD_SERVER_STG / ARGOCD_SERVER_PRD
#     The ArgoCD server hostname, without scheme (e.g. argocd.dev.rhesis.ai)
#   ARGOCD_AUTH_TOKEN_DEV / ARGOCD_AUTH_TOKEN_STG / ARGOCD_AUTH_TOKEN_PRD
#     A long-lived ArgoCD API token (see README or docs for how to generate)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (dev, stg, prd)'
        required: true
        type: string
      tag:
        description: 'Image tag to deploy'
        required: true
        type: string
      service:
        description: |
          Values key for a per-service deploy (e.g. backend, workers, frontend,
          chatbot, polyphemus, otelCollector, telemetryProcessor, docs).
          Leave empty to set global.imageTag and roll all services together.
        required: false
        type: string
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: none

    steps:
      - name: Resolve ArgoCD credentials for environment
        id: argocd-creds
        run: |
          ENV="${{ inputs.environment }}"
          case "$ENV" in
            dev)
              echo "server=${{ secrets.ARGOCD_SERVER_DEV }}"         >> "$GITHUB_OUTPUT"
              echo "token=${{ secrets.ARGOCD_AUTH_TOKEN_DEV }}"      >> "$GITHUB_OUTPUT"
              ;;
            stg)
              echo "server=${{ secrets.ARGOCD_SERVER_STG }}"         >> "$GITHUB_OUTPUT"
              echo "token=${{ secrets.ARGOCD_AUTH_TOKEN_STG }}"      >> "$GITHUB_OUTPUT"
              ;;
            prd)
              echo "server=${{ secrets.ARGOCD_SERVER_PRD }}"         >> "$GITHUB_OUTPUT"
              echo "token=${{ secrets.ARGOCD_AUTH_TOKEN_PRD }}"      >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "ERROR: Unknown environment: $ENV"
              exit 1
              ;;
          esac

      - name: Install ArgoCD CLI
        run: |
          ARGOCD_VERSION="v2.14.4"
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

      - name: Set image tag parameter on ArgoCD Application
        env:
          ARGOCD_SERVER: ${{ steps.argocd-creds.outputs.server }}
          ARGOCD_AUTH_TOKEN: ${{ steps.argocd-creds.outputs.token }}
          TAG: ${{ inputs.tag }}
          SERVICE: ${{ inputs.service }}
        run: |
          if [ -z "$SERVICE" ]; then
            PARAM="global.imageTag=$TAG"
            echo "Setting global.imageTag=$TAG on app rhesis [${{ inputs.environment }}]"
          else
            PARAM="${SERVICE}.image.tag=$TAG"
            echo "Setting ${SERVICE}.image.tag=$TAG on app rhesis [${{ inputs.environment }}]"
          fi

          argocd app set rhesis \
            --helm-set "$PARAM" \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web

      - name: Sync ArgoCD Application
        env:
          ARGOCD_SERVER: ${{ steps.argocd-creds.outputs.server }}
          ARGOCD_AUTH_TOKEN: ${{ steps.argocd-creds.outputs.token }}
        run: |
          argocd app sync rhesis \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --timeout 120
