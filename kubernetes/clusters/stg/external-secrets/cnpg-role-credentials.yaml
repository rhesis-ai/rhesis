# CNPG declarative role passwords + Cloud SQL import password.
# Create GSM secrets before sync (same project as ClusterSecretStore):
#   stg-rhesis-admin-password
#   stg-rhesis-user-password
#   stg-rhesis-analytics-user-password
#   stg-rhesis-cloudsql-password
#
# Grant ESO GSA secretmanager.secretAccessor on each key.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rhesis-admin-credentials
  namespace: rhesis
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: rhesis-admin-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: rhesis-admin
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: stg-rhesis-admin-password
---
