tools:
  # ── Projects ──────────────────────────────────────────────
  - name: list_projects
    label: Listing projects
    method: GET
    path: /projects/
    page_size: 50
    description: >
      List projects in the current organization. Use $select to request
      only the fields you need (e.g. $select=name,id).

  - name: get_project
    label: Retrieving project
    method: GET
    path: /projects/{project_id}
    description: >
      Get one project by ID. ENTITY: Project. PREREQUISITES: project_id
      from list_projects. CHAIN: use before create_endpoint (project_id
      is required) or when confirming project context for an endpoint.
      NEVER: ask the user for a project ID when they gave a name — use
      list_projects with $filter first.
    parameters:
      project_id:
        description: "REQUIRED. UUID of the project."

  - name: create_project
    label: Creating project
    method: POST
    path: /projects/
    requires_confirmation: true
    description: >
      Create a new project to organize test suites. A project groups
      related test sets, test configurations, and test runs.

  # ── Test Sets ─────────────────────────────────────────────
  - name: list_test_sets
    label: Listing test sets
    method: GET
    path: /test_sets/
    page_size: 20
    description: >
      List test sets in the organization. ENTITY: TestSet.
      PREREQUISITES: none. CHAIN: resolve by name here, then
      get_test_set for full metadata or list_test_set_tests for
      contained tests; pass id to execute_test_set. Use $select
      (e.g. $select=name,id,description) to keep payloads small.

  - name: get_test_set
    label: Retrieving test set
    method: GET
    path: /test_sets/{test_set_identifier}
    description: >
      Get one test set by UUID, nano_id, or slug. ENTITY: TestSet.
      PREREQUISITES: test_set_identifier from list_test_sets or
      get_job_status after generate_test_set. CHAIN: after generation
      completes, call this for set metadata, then list_test_set_tests
      to verify prompts before execute_test_set. NEVER: use org-wide
      list_tests when you already have the test set ID.
    parameters:
      test_set_identifier:
        description: "REQUIRED. Test set UUID, nano_id, or slug."

  - name: update_test_set
    label: Updating test set
    method: PUT
    path: /test_sets/{test_set_id}
    requires_confirmation: true
    description: >
      Update test set metadata (name, description, etc.). ENTITY: TestSet.
      PREREQUISITES: test_set_id from list_test_sets or get_test_set.
      CHAIN: resolve with list_test_sets first; use get_test_set to
      confirm current values. Send ONLY fields to change. Does NOT
      regenerate or replace tests — use generate_test_set for new content.
      Do NOT send server-managed fields (id, user_id, organization_id,
      created_at, updated_at).
    parameters:
      test_set_id:
        description: "REQUIRED. UUID of the test set to update."
      name:
        description: "New test set name (string). Omit to keep unchanged."
      description:
        description: "New description (string). Omit to keep unchanged."
      short_description:
        description: "Brief summary, one line (string). Omit to keep unchanged."

  - name: create_test_set_bulk
    label: Creating test set
    method: POST
    path: /test_sets/bulk
    requires_confirmation: true
    description: >
      Create a test set with manually specified tests. Prefer
      generate_test_set for AI-generated test content — use this tool
      only when importing specific, user-provided test prompts that
      must be used verbatim. The "tests" array is REQUIRED and must
      contain at least one test object. Do NOT send server-managed
      fields (id, user_id, organization_id, created_at, updated_at).
      PRECONDITION: when a saved plan is in effect, every behavior,
      metric, and behavior→metric mapping in the plan must be marked
      completed before this tool can run. Calling it earlier is
      rejected with "Cannot generate test sets yet…" — finish the
      prerequisite steps (behaviors, metrics, mapping links) first.
    parameters:
      name:
        description: "Test set name (required, string)"
      description:
        description: "Detailed description of the test set's purpose (string)"
      short_description:
        description: "Brief summary, one line (string)"
      priority:
        description: >
          Integer priority value (e.g. 1, 2, 3). Must be an integer, NOT
          a string like "High" or "Low". Omit if unsure.
      tests:
        description: >
          REQUIRED array of test objects (must not be empty). Each object:
          {"prompt": {"content": "the test prompt text",
          "language_code": "en", "expected_response": "optional expected
          answer"}, "behavior": "behavior name", "category": "category
          name", "topic": "topic name"}. behavior/category/topic are
          plain-text names (not UUIDs) — the server resolves or creates
          them automatically. Use list_behaviors, list_categories, and
          list_topics to discover existing values first.

  - name: generate_test_set
    label: Generating test set
    method: POST
    path: /test_sets/generate
    requires_confirmation: true
    description: >
      Generate a test set using the Rhesis synthesizer. An LLM creates
      diverse, well-structured test prompts based on the generation config
      you provide. The tests are persisted to the database automatically.
      This runs as a background task — the response includes a task_id.
      Poll get_job_status with that task_id until status is "SUCCESS",
      then extract test_set_id from the result. CHAIN: after SUCCESS →
      get_test_set + list_test_set_tests to verify content → offer
      execute_test_set. For grounded tests, pass source IDs from
      list_sources or create_source in the sources parameter.
      Supports both single-turn and multi-turn test generation via the
      test_type parameter.
      PRECONDITION: when a saved plan is in effect, every behavior,
      metric, and behavior→metric mapping in the plan must be marked
      completed before this tool can run (see "Plan progress" in the
      iteration prompt — all categories must read N/N). Calling it
      earlier is rejected with "Cannot generate test sets yet…" —
      finish the prerequisite steps (behaviors, metrics, mapping
      links) first.
    parameters:
      config:
        description: >
          REQUIRED. Object with generation parameters:
          - generation_prompt (string): Describe WHAT to test and HOW
            (e.g. "Generate tests that verify the travel agent provides
            accurate destination info, handles ambiguous queries, and
            refuses off-topic requests"). Be specific — the synthesizer
            uses this to craft test prompts.
          - behaviors (list of strings): REQUIRED. Behavior names the
            tests should target (e.g. ["Provides Accurate Information",
            "Refuses Off-Topic Requests"]). At least one is required.
          - categories (list of strings): Optional category names
            (e.g. ["Functional", "Safety"]).
          - topics (list of strings): Optional topic names
            (e.g. ["Travel advisory", "Booking"]).
      num_tests:
        description: >
          Number of tests to generate (integer, default 5). Typical
          range: 3–20 per test set.
      test_type:
        description: >
          "Single-Turn" or "Multi-Turn". Single-turn tests send one
          prompt and evaluate the response. Multi-turn tests generate
          a goal and instructions for a multi-turn conversation.
          Default: "Single-Turn".
      name:
        description: >
          Name for the generated test set (string). Use the test set
          name from your plan.
      sources:
        description: >
          Optional. List of knowledge source objects to ground the generated
          tests in real content. Each object must contain only the id field:
          [{"id": "<source-uuid>"}]. The backend fetches the source content
          by ID automatically and injects it into the synthesizer — do NOT
          attempt to load or pass source content yourself. Use list_sources
          to discover available sources and pass their IDs here.
          LIMITATION: only single-turn test generation uses sources.
          Multi-turn tests currently ignore this parameter.

  - name: execute_test_set
    label: Running test set
    method: POST
    path: /test_sets/{test_set_identifier}/execute/{endpoint_id}
    requires_confirmation: false
    description: >
      Run a complete test set against an endpoint. ENTITY: TestSet +
      Endpoint → TestRun. PREREQUISITES: test_set_identifier from
      list_test_sets or get_job_status; endpoint_id from list_endpoints
      or get_endpoint. CHAIN: after response use get_test_run for
      totals, then get_test_result_stats(mode=all) and
      list_test_results filtered by test_run_id. The backend auto-creates
      the internal test configuration — do NOT create test configurations
      manually. Response includes test_run_id and task_id.
    parameters:
      test_set_identifier:
        description: "REQUIRED. Test set UUID, nano_id, or slug (path parameter)."
      endpoint_id:
        description: "REQUIRED. The UUID of the target endpoint (path parameter)."

  - name: list_test_set_tests
    label: Listing tests in test set
    method: GET
    path: /test_sets/{test_set_identifier}/tests
    page_size: 20
    default_query:
      $select: "id,prompt,behavior,category,topic"
    description: >
      List tests that belong to one test set. ENTITY: Test (scoped to
      TestSet). PREREQUISITES: test_set_identifier from list_test_sets
      or get_job_status after generate_test_set. CHAIN: after
      generate_test_set completes, call get_test_set then this tool to
      verify prompts before execute_test_set. NEVER: use org-wide
      list_tests when you already have the test set ID.
    parameters:
      test_set_identifier:
        description: "REQUIRED. Test set UUID, nano_id, or slug."

  - name: get_test_set_metrics
    label: Checking test set metrics
    method: GET
    path: /test_sets/{test_set_identifier}/metrics
    description: >
      List metrics associated with a test set. ENTITY: TestSet → Metric.
      PREREQUISITES: test_set_identifier from list_test_sets or
      get_test_set. CHAIN: call before execute_test_set to see which
      metrics will run (set-level overrides vs behavior defaults). Empty
      list means behavior-linked metrics apply per test. Complement with
      get_metric_behaviors on individual metrics.
    parameters:
      test_set_identifier:
        description: "REQUIRED. Test set UUID, nano_id, or slug."

  - name: get_test_set_last_run
    label: Finding last test run
    method: GET
    path: /test_sets/{test_set_identifier}/last-run/{endpoint_id}
    description: >
      Get the most recent completed test run for a test set + endpoint
      pair. ENTITY: TestSet + Endpoint → TestRun. PREREQUISITES:
      test_set_identifier and endpoint_id from list_test_sets and
      list_endpoints. CHAIN: use when offering run comparison ("compare
      with last run") or before re-scoring. Returns 404 if no completed
      run exists yet. Pass test_run_id to get_test_result_stats for
      side-by-side analysis.
    parameters:
      test_set_identifier:
        description: "REQUIRED. Test set UUID, nano_id, or slug."
      endpoint_id:
        description: "REQUIRED. UUID of the endpoint."

  # ── Tests ─────────────────────────────────────────────────
  - name: list_tests
    label: Listing tests
    method: GET
    path: /tests/
    default_query:
      $select: "id,prompt,behavior,category,topic,test_set"
    page_size: 20
    description: >
      List tests in the organization. Each test defines a prompt,
      expected response behavior, and optional metadata. By default
      only core fields are returned. Add fields to $select if needed.
      Prefer list_test_set_tests when scoped to one test set.

  - name: get_test
    label: Retrieving test
    method: GET
    path: /tests/{test_id}
    description: >
      Get one test with full detail including prompt and configuration.
      ENTITY: Test. PREREQUISITES: test_id from list_test_set_tests or
      list_tests. CHAIN: after list_test_set_tests when fixing or
      reviewing a specific prompt; before update_test. NEVER: re-list
      the whole test set when you already have the test id.
    parameters:
      test_id:
        description: "REQUIRED. UUID of the test."

  - name: update_test
    label: Updating test
    method: PUT
    path: /tests/{test_id}
    requires_confirmation: true
    description: >
      Update an existing test's prompt or metadata. ENTITY: Test.
      PREREQUISITES: test_id from list_test_set_tests; call get_test
      first to see current values. CHAIN: use to fix individual bad
      prompts after generate_test_set without regenerating the whole set.
      Send ONLY fields to change. Does NOT replace generate_test_set for
      bulk creation. Do NOT send server-managed fields (id, user_id,
      organization_id, created_at, updated_at).
    parameters:
      test_id:
        description: "REQUIRED. UUID of the test to update."
      prompt:
        description: >
          Optional. Prompt object with content, language_code, and optional
          expected_response. Omit unchanged fields at the test level.
      behavior:
        description: "Behavior name string. Omit to keep unchanged."
      category:
        description: "Category name string. Omit to keep unchanged."
      topic:
        description: "Topic name string. Omit to keep unchanged."
      test_type:
        description: '"Single-Turn" or "Multi-Turn". Omit to keep unchanged.'

  # ── Test Runs ─────────────────────────────────────────────
  - name: list_test_runs
    label: Checking test runs
    method: GET
    path: /test_runs/
    page_size: 20
    description: >
      List test runs in the organization. Each test run tracks one
      execution of a test set. Key fields: id, status, test_set,
      endpoint, created_at, completed_at. Status values: Queued,
      Running, Completed, Failed. Use $select to request only the
      fields you need (e.g. $select=id,status,test_set,created_at).
      Use $filter to narrow results (e.g. $filter=status eq 'Completed').

  - name: get_test_run
    label: Checking test run status
    method: GET
    path: /test_runs/{test_run_id}
    description: >
      Get details of a specific test run including its status, timing,
      test configuration, endpoint, and test set information.
      The attributes field contains summary stats (total_tests,
      execution_mode, started_at). Always use this for accurate
      test counts rather than counting items from list_test_results.

  # ── Test Results ──────────────────────────────────────────
  - name: list_test_results
    label: Retrieving test results
    method: GET
    path: /test_results/
    default_query:
      $select: "id,status,prompt,behavior,metric_scores"
    page_size: 20
    description: >
      List test results. Each result contains the prompt sent, the
      response received, status (Passed/Failed), and evaluation scores.
      Filter by test run: $filter=test_run_id eq '<uuid>'. By default
      only lightweight fields are returned (id, status, prompt, behavior,
      metric_scores). To include the full response text, add 'response'
      to $select explicitly. Key fields: status (Passed/Failed),
      prompt (the input), metric_scores (array of score objects with
      metric name, score, and threshold).

  - name: get_test_result
    label: Retrieving test result
    method: GET
    path: /test_results/{test_result_id}
    description: >
      Get full details of a specific test result. Use this to drill into
      individual failures and understand why a test failed.

      Key fields in the response:
      - test_output.output: the endpoint's actual response text
      - test_metrics.metrics: dict of metric name → evaluation result.
        Each evaluation result contains:
        - is_successful (bool): whether this metric passed
        - score (float or string): the numeric or categorical score
        - reason (string): the evaluator's explanation of why this score
          was given — this is the most useful field for failure analysis
        - threshold (float): the pass/fail threshold (numeric metrics)
      - status: overall pass/fail for this test result

      Use the result IDs from list_test_results (filtered to failures) to
      identify which specific results to drill into. Focus on the 2-3 most
      informative failures rather than fetching every failing result.

  # ── Behaviors ─────────────────────────────────────────────
  - name: list_behaviors
    label: Looking up behaviors
    method: GET
    path: /behaviors/
    page_size: 20
    description: >
      List available behaviors. Behaviors define what an endpoint should
      do (e.g., "answer questions accurately", "refuse harmful requests").
      Use $select to request only the fields you need. CHAIN: resolve
      by name here, then get_behavior for full detail including linked
      metrics.

  - name: get_behavior
    label: Retrieving behavior
    method: GET
    path: /behaviors/{behavior_id}
    description: >
      Get one behavior with linked metrics. ENTITY: Behavior ↔ Metric.
      PREREQUISITES: behavior_id from list_behaviors. CHAIN: verify
      behavior→metric links from the behavior side; complement
      get_metric_behaviors (metric-centric view). Use during planning
      to confirm reuse candidates include the right metrics.
    parameters:
      behavior_id:
        description: "REQUIRED. UUID of the behavior."

  - name: create_behavior
    label: Creating behavior
    method: POST
    path: /behaviors/
    requires_confirmation: true
    description: >
      Create a behavior with a name AND description upfront. Use this
      BEFORE create_test_set_bulk so that when test objects reference
      the behavior by name, the server finds the pre-created behavior
      (with its description) instead of auto-creating a description-less
      one. Do NOT send server-managed fields (id, user_id, organization_id,
      created_at, updated_at).
    parameters:
      name:
        description: "REQUIRED. Behavior name (string, e.g. 'Refuses harmful requests')."
      description:
        description: "REQUIRED. Explain what this behavior means and how it should be evaluated."

  # ── Categories & Topics ───────────────────────────────────
  - name: list_categories
    label: Listing categories
    method: GET
    path: /categories/
    page_size: 20
    description: >
      List available categories. Categories classify tests by type
      (e.g., "functional", "safety", "robustness"). Use $select to
      request only the fields you need.

  - name: list_topics
    label: Listing topics
    method: GET
    path: /topics/
    page_size: 20
    description: >
      List available topics. Topics define subject areas for tests
      (e.g., "healthcare", "finance", "general knowledge"). Use $select
      to request only the fields you need.

  - name: update_behavior
    label: Updating behavior
    method: PUT
    path: /behaviors/{behavior_id}
    requires_confirmation: true
    description: >
      Update an existing behavior's fields. Use this to add a description
      to a behavior that was auto-created by create_test_set_bulk (which
      only sets the name). A behavior with a clear description is more
      useful for test planning and metric evaluation.
    parameters:
      behavior_id:
        description: "REQUIRED. UUID of the behavior to update."
      name:
        description: "Behavior name (string). Omit to keep unchanged."
      description:
        description: "Behavior description (string). Explain what this behavior means and how it should be evaluated."

  - name: list_metrics
    label: Checking existing metrics
    method: GET
    path: /metrics/
    default_query:
      $select: "id,name,description,score_type,threshold,metric_scope"
    page_size: 20
    description: >
      List available metrics for evaluating test results. ENTITY: Metric.
      PREREQUISITES: none. CHAIN: resolve by name here, then get_metric
      for full evaluation_prompt before update_metric or improve_metric.
      By default excludes evaluation_prompt — use get_metric for the
      full prompt. Link to behaviors via add_behavior_to_metric.

  - name: get_metric
    label: Retrieving metric
    method: GET
    path: /metrics/{metric_id}
    description: >
      Get one metric with full fields including evaluation_prompt.
      ENTITY: Metric. PREREQUISITES: metric_id from list_metrics.
      CHAIN: read before update_metric (precise edits) or improve_metric
      (natural-language refactors). Use get_metric_behaviors to see
      linked behaviors. NEVER: add evaluation_prompt to list_metrics
      $select on every call — use this tool instead.
    parameters:
      metric_id:
        description: "REQUIRED. UUID of the metric."

  - name: create_metric
    label: Creating metric
    method: POST
    path: /metrics/
    requires_confirmation: true
    description: >
      Create a new evaluation metric. Do NOT send server-managed fields
      (id, user_id, organization_id, created_at, updated_at, owner_id,
      assignee_id, status_id, model_id, backend_type_id, metric_type_id).
      If you only have a natural-language description, prefer
      generate_metric instead.
    parameters:
      name:
        description: "Metric name, unique within the organization (required, string)"
      metric_type:
        description: >
          Must be "custom-prompt" for user-defined metrics. Always
          include this field.
      backend_type:
        description: >
          Must be "custom" for user-defined metrics. Always include
          this field.
      score_type:
        description: >
          REQUIRED. Must be exactly "numeric" or "categorical" (string
          enum). No other values are accepted.
      evaluation_prompt:
        description: >
          REQUIRED. The prompt template used to evaluate endpoint
          responses. May reference {{prompt}}, {{response}}, and
          {{expected_response}} placeholders (string).
      metric_scope:
        description: >
          List of strings. Each value must be exactly "Single-Turn" or
          "Multi-Turn". Always include this field.
      min_score:
        description: "Minimum score value, number (numeric metrics only)"
      max_score:
        description: "Maximum score value, number (numeric metrics only)"
      threshold:
        description: "Pass/fail threshold, number (numeric metrics only)"
      threshold_operator:
        description: >
          Comparison operator for the threshold. Must be exactly one of:
          "=", "<", ">", "<=", ">=", "!=". Default is ">=".
          Only used for numeric metrics.
      categories:
        description: >
          List of category label strings (categorical metrics only).
          Must be a non-empty list when score_type is "categorical".
      passing_categories:
        description: >
          Subset of categories that indicate a pass (categorical metrics
          only). Must be a non-empty list of strings that also appear in
          "categories".

  - name: generate_metric
    label: Generating metric
    method: POST
    path: /metrics/generate
    requires_confirmation: true
    description: >
      Auto-generate a complete metric from a natural-language description.
      An LLM produces all required fields (name, evaluation_prompt,
      score_type, thresholds, categories, etc.) and the metric is
      persisted automatically. Use this when you know WHAT to measure
      but don't want to fill every field manually. Returns the created
      metric object.
    parameters:
      prompt:
        description: >
          REQUIRED. Natural-language description of what the metric
          should evaluate (e.g. "measure whether responses are factually
          accurate, on a 1-5 numeric scale").

  - name: improve_metric
    label: Improving metric
    method: POST
    path: /metrics/{metric_id}/improve
    requires_confirmation: true
    description: >
      Improve an existing metric using natural-language edit instructions.
      The LLM reads the current metric fields and applies the requested
      changes (e.g. "make the threshold stricter", "add multi-turn
      support"). The metric is updated in place and returned.
    parameters:
      metric_id:
        description: "REQUIRED. UUID of the metric to improve (path parameter)."
      prompt:
        description: >
          REQUIRED. Natural-language instructions describing what to change
          (e.g. "lower the threshold to 2", "switch to categorical with
          pass/fail categories").

  - name: update_metric
    label: Updating metric
    method: PUT
    path: /metrics/{metric_id}
    requires_confirmation: true
    description: >
      Update metric fields directly. ENTITY: Metric. PREREQUISITES:
      metric_id from list_metrics; call get_metric first to read current
      values. CHAIN: for precise field edits (threshold, evaluation_prompt).
      Use improve_metric for natural-language refactors. Does NOT change
      behavior links — use add_behavior_to_metric or
      remove_behavior_from_metric for those. Send ONLY fields to change.
      Do NOT send server-managed fields (id, user_id, organization_id,
      created_at, updated_at, owner_id, assignee_id, status_id, model_id,
      backend_type_id, metric_type_id).
    parameters:
      metric_id:
        description: "REQUIRED. UUID of the metric to update."
      name:
        description: "Metric name (string). Omit to keep unchanged."
      description:
        description: "What this metric evaluates (string). Omit to keep."
      evaluation_prompt:
        description: "Evaluation prompt template (string). Omit to keep."
      score_type:
        description: '"numeric" or "categorical". Omit to keep unchanged.'
      threshold:
        description: "Pass/fail threshold (number). Omit to keep unchanged."
      threshold_operator:
        description: 'Comparison operator: "=", "<", ">", "<=", ">=", "!=". Omit to keep.'

  - name: add_behavior_to_metric
    label: Linking behavior to metric
    method: POST
    path: /metrics/{metric_id}/behaviors/{behavior_id}
    requires_confirmation: true
    description: >
      Link a behavior to a metric (Behavior ↔ Metric relation).
      ENTITY: Behavior + Metric. PREREQUISITES: both must exist; all
      planned mappings must complete before generate_test_set. CHAIN:
      call after create_metric; verify with get_metric_behaviors; undo
      with remove_behavior_from_metric. Idempotent — repeat calls are
      no-ops.
    parameters:
      metric_id:
        description: "REQUIRED. UUID of the metric."
      behavior_id:
        description: "REQUIRED. UUID of the behavior to associate."

  - name: remove_behavior_from_metric
    label: Unlinking behavior from metric
    method: DELETE
    path: /metrics/{metric_id}/behaviors/{behavior_id}
    requires_confirmation: true
    description: >
      Remove a behavior-to-metric link. ENTITY: Behavior ↔ Metric.
      PREREQUISITES: metric_id and behavior_id; confirm link exists
      via get_metric_behaviors. CHAIN: inverse of add_behavior_to_metric.
      Removing links may block generate_test_set if behaviors in the
      plan no longer have metrics.
    parameters:
      metric_id:
        description: "REQUIRED. UUID of the metric."
      behavior_id:
        description: "REQUIRED. UUID of the behavior to unlink."

  - name: get_metric_behaviors
    label: Checking metric behaviors
    method: GET
    path: /metrics/{metric_id}/behaviors/
    page_size: 20
    description: >
      List all behaviors currently linked to a metric. Use this to
      verify which behaviors a metric evaluates or to check whether a
      specific behavior is already associated before calling
      add_behavior_to_metric.
    parameters:
      metric_id:
        description: "REQUIRED. UUID of the metric."

  - name: list_endpoints
    label: Finding endpoints
    method: GET
    path: /endpoints/
    page_size: 50
    description: >
      List configured endpoints. ENTITY: Endpoint. PREREQUISITES: none.
      CHAIN: resolve by name here, then get_endpoint for full config
      (mappings, auth) or pass id to check_endpoint, explore_endpoint,
      execute_test_set. Use $select=name,id,url,description for browsing.

  - name: get_endpoint
    label: Retrieving endpoint
    method: GET
    path: /endpoints/{endpoint_id}
    description: >
      Get full endpoint configuration including request/response mappings
      and auth settings. ENTITY: Endpoint. PREREQUISITES: endpoint_id
      from list_endpoints. CHAIN: use before update_endpoint or when
      debugging execute_test_set failures. NEVER: rely on list_endpoints
      alone when you need mapping or auth details.
    parameters:
      endpoint_id:
        description: "REQUIRED. UUID of the endpoint."

  - name: create_endpoint
    label: Creating endpoint
    method: POST
    path: /endpoints/
    requires_confirmation: true
    description: >
      Register a new REST API endpoint (an AI system to be tested — a chat
      API, completion API, or chatbot). Resolve the target project FIRST with
      list_projects and pass its id as project_id (REQUIRED — the endpoint
      cannot be created without it). Do NOT send server-managed fields
      (id, user_id, organization_id, status_id, created_at, updated_at).
      After creating, you can verify reachability with check_endpoint.
    parameters:
      name:
        description: "REQUIRED. Endpoint name, unique within the project (string)."
      project_id:
        description: >
          REQUIRED. UUID of the project this endpoint belongs to. Resolve it
          via list_projects (use the user's project, or ask if ambiguous).
      connection_type:
        description: 'Connection protocol. Use "REST" for HTTP APIs (default for chatbots).'
      url:
        description: "REQUIRED for REST. Full endpoint URL, e.g. https://api.example.com/chat."
      method:
        description: 'HTTP method for REST endpoints, e.g. "POST" or "GET".'
      description:
        description: "What the endpoint does (string)."
      environment:
        description: '"production", "staging", "development", or "local". Default: "development".'
      request_headers:
        description: >
          Object of HTTP headers sent with each request, e.g.
          {"Content-Type": "application/json"}.
      request_mapping:
        description: >
          Object mapping the request body, using {{ input }} for the user
          message. e.g. {"message": "{{ input }}"}.
      response_mapping:
        description: >
          Object mapping the response, using JSONPath to extract the output
          field. e.g. {"output": "$.response"}.
      query_params:
        description: "Optional object of query-string parameters."
      response_format:
        description: '"json", "xml", or "text". Default: "json".'
      auth_type:
        description: >
          Authentication scheme: "bearer_token", "client_credentials", or
          "api_key". Omit for unauthenticated endpoints.
      auth_token:
        description: "Bearer token / API key (write-only, stored encrypted)."
      client_id:
        description: "OAuth client id (client_credentials flow)."
      client_secret:
        description: "OAuth client secret (write-only, stored encrypted)."
      token_url:
        description: "OAuth token endpoint URL (client_credentials flow)."
      scopes:
        description: "List of OAuth scope strings (client_credentials flow)."
      audience:
        description: "OAuth audience (client_credentials flow)."

  - name: update_endpoint
    label: Updating endpoint
    method: PUT
    path: /endpoints/{endpoint_id}
    requires_confirmation: true
    description: >
      Update an existing endpoint's configuration. Resolve the endpoint
      FIRST with list_endpoints to obtain its id, then pass that id as
      endpoint_id. Send ONLY the fields you want to change — every field is
      optional and omitted fields keep their current values. Do NOT send
      server-managed fields (id, user_id, organization_id, status_id,
      created_at, updated_at). After updating, you can verify reachability
      with check_endpoint.
    parameters:
      endpoint_id:
        description: "REQUIRED. UUID of the endpoint to update (path parameter)."
      name:
        description: "New endpoint name, unique within the project (string)."
      description:
        description: "What the endpoint does (string)."
      url:
        description: "Full endpoint URL, e.g. https://api.example.com/chat."
      method:
        description: 'HTTP method for REST endpoints, e.g. "POST" or "GET".'
      environment:
        description: '"production", "staging", "development", or "local".'
      request_headers:
        description: >
          Object of HTTP headers sent with each request, e.g.
          {"Content-Type": "application/json"}.
      request_mapping:
        description: >
          Object mapping the request body, using {{ input }} for the user
          message. e.g. {"message": "{{ input }}"}.
      response_mapping:
        description: >
          Object mapping the response, using JSONPath to extract the output
          field. e.g. {"output": "$.response"}.
      query_params:
        description: "Optional object of query-string parameters."
      response_format:
        description: '"json", "xml", or "text".'
      auth_type:
        description: >
          Authentication scheme: "bearer_token", "client_credentials", or
          "api_key".
      auth_token:
        description: "Bearer token / API key (write-only, stored encrypted)."
      client_id:
        description: "OAuth client id (client_credentials flow)."
      client_secret:
        description: "OAuth client secret (write-only, stored encrypted)."
      token_url:
        description: "OAuth token endpoint URL (client_credentials flow)."
      scopes:
        description: "List of OAuth scope strings (client_credentials flow)."
      audience:
        description: "OAuth audience (client_credentials flow)."

  - name: check_endpoint
    label: Checking endpoint connectivity
    method: POST
    path: /endpoints/{endpoint_id}/invoke
    requires_confirmation: false
    description: >
      Send a test message to an endpoint to verify it is reachable and
      responding. Only use this when you are about to act on the endpoint
      (explore, run tests, send a request) — not when simply listing or
      looking up endpoints. Send a simple input like {"input": "hello"}
      and check whether the response is valid. Report any errors to the
      user (e.g. connection refused, timeout, auth failure).
    parameters:
      endpoint_id:
        description: "REQUIRED. UUID of the endpoint to check."
      input:
        description: "A simple test message string (e.g. 'hello')."

  - name: explore_endpoint
    label: Exploring endpoint
    method: POST
    path: /endpoints/{endpoint_id}/explore
    requires_confirmation: true
    description: >
      Run a multi-turn exploration of an endpoint using Penelope to
      discover its domain, capabilities, limits, and response patterns.
      This runs as a background task — the response includes a task_id.
      Poll get_job_status with that task_id until status is "SUCCESS",
      then read the findings from the result field. Typical duration:
      30s–2min for single strategies, 1–3min for "comprehensive".
      Either strategy or goal is required.
    parameters:
      endpoint_id:
        description: "REQUIRED. UUID of the endpoint to explore (path parameter)."
      strategy:
        description: >
          Exploration strategy. One of "domain_probing" (discovers
          domain, purpose, and persona), "capability_mapping" (enumerates
          features and interaction patterns), "boundary_discovery" (finds
          refusal patterns and limits), or "comprehensive" (runs all three
          in sequence). When set, goal and instructions are generated
          automatically. Either strategy or goal is required.
      goal:
        description: >
          What to learn about the endpoint. Required only when no strategy
          is specified. Example: "Understand the endpoint's domain and
          restrictions."
      instructions:
        description: "Optional step-by-step probing instructions."
      scenario:
        description: "Optional persona/context, e.g. 'You are a new user'."
      restrictions:
        description: "Optional constraints to verify during exploration."
      previous_findings:
        description: >
          Optional structured findings from a prior exploration run.
          The strategy uses them to build on earlier results.

  # ── Statistics & Comparison ──────────────────────────────
  - name: get_test_result_stats
    label: Analyzing test results
    method: GET
    path: /test_results/stats
    default_query:
      mode: test_runs
    description: >
      Get aggregated statistics for test results. Use this for single-run
      analysis (which behaviors/metrics failed?) and multi-run comparison
      (did results improve?). The mode parameter controls what is returned:

      - **all**: Complete stats for a single run — behavior pass rates,
        metric pass rates, overall totals, and timeline. Use with a single
        test_run_id immediately after execution for a full analysis in one
        call. This is the most efficient option for post-run analysis.
      - **behavior**: Pass rates grouped by behavior. Use with test_run_id
        to see which behaviors passed/failed in a specific run.
      - **metrics**: Pass rates grouped by metric name. Use with test_run_id
        to see which metrics are the problem areas.
      - **test_runs**: Per-run pass/fail summary with pass rates. Best for
        comparing two or more runs side by side. Pass multiple test_run_ids.
      - **summary**: Lightweight overall pass/fail totals only.

      For single-run analysis: use mode=all with test_run_id.
      For multi-run comparison: use mode=test_runs with test_run_ids.
      Filter by behavior_ids or test_set_ids for targeted analysis.
    parameters:
      mode:
        description: >
          Stats mode: "test_runs" (per-run comparison), "behavior"
          (by behavior), "metrics" (by metric), "summary" (totals),
          "all" (everything). Default: "test_runs".
      test_run_ids:
        description: >
          Filter to specific test runs (array of UUIDs). Pass two or
          more run IDs to compare them side by side.
      test_run_id:
        description: >
          Filter to a single test run (UUID). Use test_run_ids for
          multi-run comparison.
      test_set_ids:
        description: "Filter by test set UUIDs (array)."
      behavior_ids:
        description: "Filter by behavior UUIDs (array)."
      start_date:
        description: "Start date in ISO format (e.g. 2026-01-01)."
      end_date:
        description: "End date in ISO format."

  - name: get_test_run_stats
    label: Analyzing test runs
    method: GET
    path: /test_runs/stats
    default_query:
      mode: summary
    description: >
      Get run-level analytics: how many runs by status, which test sets
      are run most often, who runs tests, and run volume over time.
      Use this for operational overview, NOT for comparing pass/fail
      outcomes between runs (use get_test_result_stats for that).

      Modes: "summary" (totals), "status" (status distribution),
      "results" (result distribution), "test_sets" (most run test sets),
      "executors" (top executors), "timeline" (monthly trends),
      "all" (everything).
    parameters:
      mode:
        description: >
          Stats mode: "summary", "status", "results", "test_sets",
          "executors", "timeline", "all". Default: "summary".
      test_run_ids:
        description: "Filter to specific test runs (array of UUIDs)."
      endpoint_ids:
        description: "Filter by endpoint UUIDs (array)."
      test_set_ids:
        description: "Filter by test set UUIDs (array)."
      months:
        description: "Months of history to include (default: 6)."
      start_date:
        description: "Start date in ISO format (overrides months)."
      end_date:
        description: "End date in ISO format (overrides months)."

  # ── Knowledge Sources ────────────────────────────────────
  - name: list_sources
    label: Listing knowledge sources
    method: GET
    path: /sources/
    page_size: 50
    default_query:
      $select: "id,title,description,url,source_type_id,status_id,organization_id,user_id"
    description: >
      Discover available knowledge sources by title and description.
      Use this when the user mentions documentation, reference material,
      or says things like "based on our FAQ", "use the product spec",
      "I have reference material". Search by name with
      $filter=contains(tolower(title), 'keyword'). The agent should
      NEVER fetch source content — pass IDs directly to generate_test_set
      and the backend handles content injection. CHAIN: if no match,
      create_source then pass new id to generate_test_set (single-turn only).
    parameters:
      filter:
        description: >
          OData filter expression to search by title or description, e.g.
          $filter=contains(tolower(title), 'keyword').

  - name: create_source
    label: Creating knowledge source
    method: POST
    path: /sources/
    requires_confirmation: true
    description: >
      Create a knowledge source for grounding test generation. ENTITY: Source.
      PREREQUISITES: copy source_type_id from list_sources (same type) or
      from an existing source of that type. CHAIN: after create, pass
      [{"id": "<uuid>"}] to generate_test_set sources (single-turn only).
      For pasted text: title + content (Manual type). For URLs: title + url
      (Website type). NEVER fetch or pass raw content to generate_test_set —
      only the ID. File uploads require the UI (POST /sources/upload not
      available via MCP). Do NOT send server-managed fields (id, user_id,
      organization_id, created_at, updated_at).
    parameters:
      title:
        description: "REQUIRED. Source title (string)."
      description:
        description: "Optional description of the source (string)."
      content:
        description: >
          Raw text content for Manual-type sources. Use when the user
          pasted reference material in chat — create a source instead of
          embedding text in generate_test_set.
      url:
        description: >
          URL for Website-type sources (must start with http:// or https://).
          Backend extracts content automatically.
      source_type_id:
        description: >
          REQUIRED. UUID of the source type. Copy from list_sources on an
          existing source of the same type (check source_type_id field).

  # ── Background Jobs ─────────────────────────────────────
  - name: get_job_status
    label: Checking job status
    method: GET
    path: /jobs/{task_id}
    requires_confirmation: false
    description: >
      Check the status of a background job. Poll this endpoint until
      the status is "SUCCESS" or "FAILURE". Status values: PENDING →
      STARTED → PROGRESS → SUCCESS (or FAILURE). When SUCCESS, the
      "result" field contains job-specific data:
      - explore_endpoint: full exploration findings including domain,
        capabilities, limits, conversation summary, and strategy_findings.
      - generate_test_set: "test_set_id" — then call get_test_set and
        list_test_set_tests to verify before offering execute_test_set.
      - execute_test_set: use the test_run_id from the original response.
      If FAILURE, the "error" field describes what went wrong.
    parameters:
      task_id:
        description: >
          REQUIRED. The task ID returned by explore_endpoint,
          generate_test_set, or execute_test_set (path parameter).
