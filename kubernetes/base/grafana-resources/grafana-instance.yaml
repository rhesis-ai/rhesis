apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    dashboards: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  disableDefaultAdminSecret: true
  deployment:
    spec:
      replicas: 1
      template:
        spec:
          containers:
            - name: grafana
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              env:
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: admin-password
                - name: GF_USERS_ALLOW_SIGN_UP
                  value: "false"
  config:
    server:
      root_url: PLACEHOLDER
    auth.anonymous:
      enabled: "false"
