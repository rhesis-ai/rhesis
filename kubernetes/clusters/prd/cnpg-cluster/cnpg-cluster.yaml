# CloudNativePG: HA PostgreSQL for production.
# Operator Application: kubernetes/clusters/prd/cnpg-operator.yaml
# Argo CD Application: kubernetes/clusters/prd/cnpg-cluster-application.yaml (sync-wave 5)
#
# Secrets and bootstrap notes: see kubernetes/clusters/stg/cnpg-cluster/cnpg-cluster.yaml
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: rhesis-prd
  namespace: rhesis
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  description: "Rhesis production PostgreSQL (CloudNativePG)"
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4-1
  storage:
    size: 100Gi
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 4Gi
  postgresql:
    parameters:
      max_connections: "300"
  primaryUpdateStrategy: unsupervised
  managed:
    roles:
      - name: rhesis-admin
        ensure: present
        login: true
        bypassrls: true
        passwordSecret:
          name: rhesis-admin-credentials
      - name: rhesis-user
        ensure: present
        login: true
        bypassrls: false
        passwordSecret:
          name: rhesis-user-credentials
      - name: rhesis-analytics-user
        ensure: present
        login: true
        bypassrls: false
        passwordSecret:
          name: rhesis-analytics-user-credentials
  bootstrap:
    initdb:
      database: rhesis-prod-db
      owner: rhesis-admin
      postInitSQL:
        - CREATE ROLE "rhesis-user" LOGIN;
        - CREATE ROLE "rhesis-analytics-user" LOGIN;
        - CREATE DATABASE "rhesis-analytics-prd-db" OWNER "rhesis-analytics-user";
        - GRANT CONNECT ON DATABASE "rhesis-prod-db" TO "rhesis-user";
        - GRANT CONNECT ON DATABASE "rhesis-analytics-prd-db" TO "rhesis-admin";
      import:
        type: microservice
        # SOURCE only: Cloud SQL database name for pg_dump (must exist on Cloud SQL).
        # TARGET database is bootstrap.initdb.database (rhesis-prod-db). Use rhesis-db if
        # production Cloud SQL still uses that name.
        databases:
          - rhesis-prod-db
        source:
          externalCluster: cloudsql-prd
        # Owner rhesis-admin needs no duplicate GRANTs; bypassrls via managed.roles.
        postImportApplicationSQL:
          - CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
          - CREATE EXTENSION IF NOT EXISTS vector;
          - GRANT CONNECT ON DATABASE "rhesis-prod-db" TO "rhesis-user";
          - GRANT USAGE, CREATE ON SCHEMA public TO "rhesis-user";
          - GRANT SELECT, REFERENCES ON ALL TABLES IN SCHEMA public TO "rhesis-user";
          - GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO "rhesis-user";
          - ALTER DEFAULT PRIVILEGES FOR ROLE "rhesis-admin" IN SCHEMA public GRANT SELECT, REFERENCES ON TABLES TO "rhesis-user";
          - ALTER DEFAULT PRIVILEGES FOR ROLE "rhesis-admin" IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO "rhesis-user";
  externalClusters:
    - name: cloudsql-prd
      connectionParameters:
        host: "REPLACE_ME_CLOUDSQL_PRD_HOST"
        port: "5432"
        user: "REPLACE_ME_CLOUDSQL_PRD_USER"
        dbname: postgres
        sslmode: require
      password:
        name: cloudsql-prd-credentials
        key: password
  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      destinationPath: gs://cnpg-backup-rhesis-prd
      serverName: rhesis-prd
      googleCredentials:
        applicationCredentials:
          name: rhesis-prd-cnpg-gcs
          key: key.json
