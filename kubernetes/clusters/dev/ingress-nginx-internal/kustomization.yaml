apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/ingress-nginx-internal

# Cluster values (region, subnet, LB IP) in cluster.env — keep in sync with Terraform
configMapGenerator:
  - name: ingress-internal-config
    envs:
      - cluster.env
    options:
      annotations:
        config.kubernetes.io/local-config: "true"
      disableNameSuffixHash: true

replacements:
  - source:
      kind: ConfigMap
      name: ingress-internal-config
      fieldPath: data.internal-lb-ip
    targets:
      - select:
          kind: Application
          name: ingress-nginx-internal
        fieldPaths:
          - spec.source.helm.valuesObject.controller.service.internal.loadBalancerIP
  - source:
      kind: ConfigMap
      name: ingress-internal-config
      fieldPath: data.ilb-subnet-name
    targets:
      - select:
          kind: Application
          name: ingress-nginx-internal
        fieldPaths:
          - spec.source.helm.valuesObject.controller.service.internal.annotations.[networking.gke.io/internal-load-balancer-subnet]
