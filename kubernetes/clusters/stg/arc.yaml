apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stg-arc
  namespace: argocd
spec:
  project: arc-runners
  source:
    repoURL: https://github.com/rhesis-ai/rhesis.git
    targetRevision: main
    path: kubernetes/clusters/stg/arc
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
