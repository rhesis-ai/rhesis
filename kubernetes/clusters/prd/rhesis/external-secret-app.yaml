# ExternalSecret: syncs all sensitive Rhesis application credentials from
# GCP Secret Manager into a single Kubernetes Secret named "rhesis-app-secrets".
#
# This secret is referenced by:
#   - All application Deployments (via secretRef envFrom) — except DB user/password, which
#     come from the CloudNativePG-generated secret rhesis-prd-app (Helm values.database)
#   - Bitnami Valkey subchart (auth.existingSecret)
#
# Each remoteRef.key must exist in Secret Manager. Create with:
#   gcloud secrets create <remoteRef.key> --replication-policy=automatic --data-file=-
# Grant ESO:
#   gcloud secrets add-iam-policy-binding <key> \
#     --member="serviceAccount:eso-prd@rhesis-dev-sandbox.iam.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor"
#
# Values can be bootstrapped from infrastructure/config or Secret Manager (PRD_* exports).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rhesis-app-secrets
  namespace: rhesis
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: rhesis-app-secrets
    creationPolicy: Owner
  data:
    # -----------------------------------------------------------------------
    # Database (user/password/URL from CNPG rhesis-prd-app, not from GSM)
    # -----------------------------------------------------------------------
    - secretKey: DB_ENCRYPTION_KEY
      remoteRef:
        key: prd-rhesis-db-encryption-key

    - secretKey: SESSION_SECRET_KEY
      remoteRef:
        key: prd-rhesis-session-secret-key

    # -----------------------------------------------------------------------
    # Redis / Valkey
    # -----------------------------------------------------------------------
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: prd-rhesis-redis-pass

    # Optional external Redis/Memorystore (in-cluster chart may override for workers)
    - secretKey: BROKER_URL
      remoteRef:
        key: prd-rhesis-broker-url

    - secretKey: CELERY_RESULT_BACKEND
      remoteRef:
        key: prd-rhesis-celery-result-backend

    # -----------------------------------------------------------------------
    # JWT
    # -----------------------------------------------------------------------
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: prd-rhesis-jwt-secret-key

    - secretKey: AUTH_SECRET
      remoteRef:
        key: prd-rhesis-auth-secret

    # -----------------------------------------------------------------------
    # AI model API keys
    # -----------------------------------------------------------------------
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: prd-rhesis-gemini-api-key

    - secretKey: GOOGLE_API_KEY
      remoteRef:
        key: prd-rhesis-google-api-key

    - secretKey: PERSPECTIVE_API_KEY
      remoteRef:
        key: prd-rhesis-perspective-api-key

    - secretKey: CHATBOT_API_KEY
      remoteRef:
        key: prd-rhesis-chatbot-api-key

    - secretKey: RHESIS_API_KEY
      remoteRef:
        key: prd-rhesis-rhesis-api-key

    # -----------------------------------------------------------------------
    # GCS and GCP service account JSON (per-feature keys)
    # -----------------------------------------------------------------------
    - secretKey: GOOGLE_APPLICATION_CREDENTIALS
      remoteRef:
        key: prd-rhesis-google-application-credentials

    - secretKey: STORAGE_SERVICE_ACCOUNT_KEY
      remoteRef:
        key: prd-rhesis-storage-service-account-key

    # gs://... — must match Terraform GCS file bucket (e.g. sources-rhesis-dev)
    - secretKey: STORAGE_SERVICE_URI
      remoteRef:
        key: prd-rhesis-storage-service-uri

    - secretKey: GCP_SERVICE_ACCOUNT
      remoteRef:
        key: prd-rhesis-gcp-service-account

    - secretKey: VERTEX_AI_LOCATION
      remoteRef:
        key: prd-rhesis-vertex-ai-location

    - secretKey: VERTEX_AI_PROJECT
      remoteRef:
        key: prd-rhesis-vertex-ai-project

    # -----------------------------------------------------------------------
    # GitHub OAuth (if used)
    # -----------------------------------------------------------------------
    - secretKey: GH_CLIENT_ID
      remoteRef:
        key: prd-rhesis-gh-client-id

    - secretKey: GH_CLIENT_SECRET
      remoteRef:
        key: prd-rhesis-gh-client-secret

    # -----------------------------------------------------------------------
    # SMTP & email
    # -----------------------------------------------------------------------
    - secretKey: SMTP_HOST
      remoteRef:
        key: prd-rhesis-smtp-host

    - secretKey: SMTP_USER
      remoteRef:
        key: prd-rhesis-smtp-user

    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: prd-rhesis-smtp-password

    - secretKey: FROM_EMAIL
      remoteRef:
        key: prd-rhesis-from-email

    - secretKey: AGENT_EMAIL_BCC
      remoteRef:
        key: prd-rhesis-agent-email-bcc

    - secretKey: WELCOME_FROM_EMAIL
      remoteRef:
        key: prd-rhesis-welcome-from-email

    - secretKey: WELCOME_CALENDAR_LINK
      remoteRef:
        key: prd-rhesis-welcome-calendar-link

    - secretKey: SENDGRID_API_KEY
      remoteRef:
        key: prd-rhesis-sendgrid-api-key

    - secretKey: SENDGRID_DAY_1_EMAIL_TEMPLATE_ID
      remoteRef:
        key: prd-rhesis-sendgrid-day-1-email-template-id

    - secretKey: SENDGRID_DAY_2_EMAIL_TEMPLATE_ID
      remoteRef:
        key: prd-rhesis-sendgrid-day-2-email-template-id

    - secretKey: SENDGRID_DAY_3_EMAIL_TEMPLATE_ID
      remoteRef:
        key: prd-rhesis-sendgrid-day-3-email-template-id

    # -----------------------------------------------------------------------
    # Frontend / NextAuth
    # -----------------------------------------------------------------------
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: prd-rhesis-nextauth-secret

    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: prd-rhesis-google-client-id

    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: prd-rhesis-google-client-secret

    # -----------------------------------------------------------------------
    # Analytics DB (telemetry)
    # -----------------------------------------------------------------------
    - secretKey: ANALYTICS_DB_USER
      remoteRef:
        key: prd-rhesis-analytics-db-user

    - secretKey: ANALYTICS_DB_PASS
      remoteRef:
        key: prd-rhesis-analytics-db-pass

    - secretKey: ANALYTICS_DB_HOST
      remoteRef:
        key: prd-rhesis-analytics-db-host

    - secretKey: ANALYTICS_DB_PORT
      remoteRef:
        key: prd-rhesis-analytics-db-port

    - secretKey: ANALYTICS_DB_NAME
      remoteRef:
        key: prd-rhesis-analytics-db-name

    - secretKey: ANALYTICS_DB_DRIVER
      remoteRef:
        key: prd-rhesis-analytics-db-driver

    - secretKey: ANALYTICS_DATABASE_URL
      remoteRef:
        key: prd-rhesis-analytics-database-url

    # -----------------------------------------------------------------------
    # OpenTelemetry
    # -----------------------------------------------------------------------
    - secretKey: OTEL_API_KEY
      remoteRef:
        key: prd-rhesis-otel-api-key

    # Optional: if backend is configured to read OTLP endpoint as secret
    - secretKey: OTEL_EXPORTER_OTLP_ENDPOINT
      remoteRef:
        key: prd-rhesis-otel-exporter-otlp-endpoint

    # -----------------------------------------------------------------------
    # Polyphemus (optional feature)
    # -----------------------------------------------------------------------
    - secretKey: DEFAULT_POLYPHEMUS_URL
      remoteRef:
        key: prd-rhesis-default-polyphemus-url

    - secretKey: POLYPHEMUS_DEFAULT_MODEL
      remoteRef:
        key: prd-rhesis-polyphemus-default-model

    - secretKey: POLYPHEMUS_MODEL_BUCKET
      remoteRef:
        key: prd-rhesis-polyphemus-model-bucket

    - secretKey: POLYPHEMUS_MODEL_PATH
      remoteRef:
        key: prd-rhesis-polyphemus-model-path
