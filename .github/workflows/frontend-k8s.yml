name: "[Deploy] Frontend (K8s)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: string
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        type: string
        default: ''

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate environment parameter
        uses: ./.github/actions/validate-environment
        with:
          environment: ${{ inputs.environment || github.event.inputs.environment }}

  gate:
    needs: validate-inputs
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Approve deploy
        run: echo "Deploy approved for ${{ github.event.inputs.environment }}"

  build:
    needs: [validate-inputs, gate]
    if: |
      always() &&
      needs.validate-inputs.result == 'success' &&
      (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ENVIRONMENT: ${{ inputs.environment || github.event.inputs.environment || 'dev' }}
      IMAGE: rhesis-frontend

    steps:
      - uses: actions/checkout@v6

      - name: Resolve GCP credentials
        run: |
          trap 'rm -f sa-key.json' EXIT
          if [ "$ENVIRONMENT" = "dev" ]; then
            echo '${{ secrets.GCP_SA_KEY_DEV }}' > sa-key.json
            echo "PROJECT_ID=${{ secrets.TF_PROJECT_ID_DEV }}" >> $GITHUB_ENV
            echo "FRONTEND_ENV=development" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_BASE_URL=https://dev-api.rhesis.ai" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_APP_URL=https://dev-app.rhesis.ai" >> $GITHUB_ENV
          elif [ "$ENVIRONMENT" = "stg" ]; then
            echo '${{ secrets.GCP_SA_KEY_STG }}' > sa-key.json
            echo "PROJECT_ID=${{ secrets.TF_PROJECT_ID_STG }}" >> $GITHUB_ENV
            echo "FRONTEND_ENV=staging" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_BASE_URL=https://stg-api.rhesis.ai" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_APP_URL=https://stg-app.rhesis.ai" >> $GITHUB_ENV
          else
            echo '${{ secrets.GCP_SA_KEY_PRD }}' > sa-key.json
            echo "PROJECT_ID=${{ secrets.TF_PROJECT_ID_PRD }}" >> $GITHUB_ENV
            echo "FRONTEND_ENV=production" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_API_BASE_URL=https://api.rhesis.ai" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_APP_URL=https://app.rhesis.ai" >> $GITHUB_ENV
          fi

      - name: Authenticate to Google Cloud
        run: |
          gcloud auth activate-service-account --key-file=sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa-key.json" >> $GITHUB_ENV

      - name: Set registry and tag
        run: |
          REGISTRY="europe-west4-docker.pkg.dev/${{ env.PROJECT_ID }}/rhesis"
          echo "REGISTRY=$REGISTRY" >> $GITHUB_ENV

          TAG="${{ inputs.tag || github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(echo "${{ github.sha }}" | cut -c1-8)
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV

          echo "Registry: $REGISTRY"
          echo "Tag:      $TAG"
          echo "Image:    $IMAGE"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet

      - name: Build Container
        run: |
          docker build --platform linux/amd64 \
            --build-arg FRONTEND_ENV="$FRONTEND_ENV" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL" \
            --build-arg NEXT_PUBLIC_APP_URL="$NEXT_PUBLIC_APP_URL" \
            --build-arg NEXT_PUBLIC_QUICK_START=false \
            -t "$REGISTRY/$IMAGE:$TAG" \
            -t "$REGISTRY/$IMAGE:latest" \
            -f apps/frontend/Dockerfile .
          echo "Built $REGISTRY/$IMAGE:$TAG"

      - name: Push Container
        run: |
          docker push "$REGISTRY/$IMAGE:$TAG"
          docker push "$REGISTRY/$IMAGE:latest"
          echo "Pushed $REGISTRY/$IMAGE:$TAG and :latest"

      - name: Cleanup SA key
        if: always()
        run: rm -f sa-key.json
