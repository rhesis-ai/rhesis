apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/kube-prometheus-stack

configMapGenerator:
  - name: prometheus-config
    literals:
      - retention=15d
      - storage-size=20Gi
    options:
      annotations:
        config.kubernetes.io/local-config: "true"
      disableNameSuffixHash: true

replacements:
  - source:
      kind: ConfigMap
      name: prometheus-config
      fieldPath: data.retention
    targets:
      - select:
          kind: Application
          name: kube-prometheus-stack
        fieldPaths:
          - spec.source.helm.valuesObject.prometheus.prometheusSpec.retention
  - source:
      kind: ConfigMap
      name: prometheus-config
      fieldPath: data.storage-size
    targets:
      - select:
          kind: Application
          name: kube-prometheus-stack
        fieldPaths:
          - spec.source.helm.valuesObject.prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage
