# Production environment overrides — merged on top of values.yaml by ArgoCD.
# GCP project: rhesis-prd (Artifact Registry and Vertex AI below).
#
# REQUIRED FOR PROD: set global.imageTag to an immutable release tag (git SHA from CI).
# Helm render fails if imageTag is empty or "latest" (see _helpers.tpl rhesis.image).

# ---------------------------------------------------------------------------
# Global — Artifact Registry
# ---------------------------------------------------------------------------
global:
  registry: "europe-west4-docker.pkg.dev/rhesis-prd/rhesis"
  imagePullPolicy: Always
  # Set to a pinned tag before deploy, e.g. "v1.2.3" or the Artifact Registry digest tag.
  # Helm render fails if this is empty or "latest" — enforced by requirePinnedTag below.
  imageTag: "d6f9572a"
  requirePinnedTag: true

# DB: app URL uses rhesis-user; migrate.sh / Alembic use rhesis-admin.
# Cluster manifest: kubernetes/clusters/prd/cnpg-cluster/cnpg-cluster.yaml
database:
  existingSecret: "rhesis-user-credentials"
  migrationSecret: "rhesis-admin-credentials"
  usernameKey: username
  passwordKey: password

# ---------------------------------------------------------------------------
# Non-sensitive config
# ---------------------------------------------------------------------------
config:
  environment: "production"
  logLevel: "INFO"

  # Must match kubernetes/clusters/prd/cnpg-cluster/cnpg-cluster.yaml bootstrap.initdb.database
  dbName: "rhesis-prd-db"
  dbUser: "rhesis-admin"

  # Frontend
  apiBaseUrl: "https://api.rhesis.ai"
  nextPublicAppUrl: "https://app.rhesis.ai"
  nextPublicSupportEmail: "hello@rhesis.ai"
  onboardingVideoUrl: "https://youtu.be/fNtxqGtBu2Y"
  # Backend
  rhesisBaseUrl: "https://api.rhesis.ai"
  frontendUrl: "https://app.rhesis.ai"
  backendUrl: "http://backend:8080"

  # GCP
  # TODO: migrate to rhesis-prd. Currently shared with dev for Vertex AI quota/billing.
  # Audit logs and quota are split across projects until this is resolved.
  vertexAiProject: "playground-437609"

  # AI / Vertex
  defaultGenerationModel: "vertex_ai/gemini-3.1-flash-lite"
  defaultEvaluationModel: "vertex_ai/gemini-3.1-flash-lite"
  defaultExecutionModel: "vertex_ai/gemini-3.1-flash-lite"
  defaultEmbeddingModel: "vertex_ai/text-embedding-005"
  vertexAiLocation: "eu"
  azureOpenAiApiVersion: "2024-02-01"

# ---------------------------------------------------------------------------
# Ingress — prd (internal class for VPN-only testing; switch to external for go-live)
# ---------------------------------------------------------------------------
backend:
  replicas: 2
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  ingress:
    enabled: true
    host: "api.rhesis.ai"
    className: internal
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "25m"
  livenessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 5
  readinessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5

frontend:
  replicas: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  ingress:
    enabled: true
    host: "app.rhesis.ai"
    className: internal
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

workers:
  - name: default
    enabled: true
    image:
      repository: rhesis-worker
      tag: ""
    replicas: 2
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "1000m"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    env: []

docs:
  replicas: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  ingress:
    enabled: true
    host: "docs.rhesis.ai"
    className: internal
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

chatbot:
  replicas: 2
  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  ingress:
    enabled: true
    host: "chatbot.rhesis.ai"
    className: internal
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

otelCollector:
  ingress:
    enabled: true
    host: "telemetry.rhesis.ai"
    className: internal
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

telemetryProcessor:
  enabled: true

polyphemus:
  replicas: 2
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  ingress:
    enabled: true
    host: "polyphemus.rhesis.ai"
    className: internal
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
  livenessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 5
  readinessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5

# PostgreSQL disabled for prd — use CNPG Cluster; host must match CNPG Cluster + -rw
postgresql:
  enabled: false

externalDatabase:
  # Must match the CNPG read-write Service for your Cluster (metadata.name = rhesis-prd)
  host: "rhesis-prd-rw.rhesis.svc.cluster.local"
  port: "5432"

# Analytics DB — lives in the same CNPG cluster as the main DB (rhesis-prd).
# Created by postInitSQL in kubernetes/clusters/prd/cnpg-cluster/cnpg-cluster.yaml.
# Owner: rhesis-analytics-user (password from rhesis-analytics-user-credentials via ESO).
externalAnalyticsDatabase:
  host: "rhesis-prd-rw.rhesis.svc.cluster.local"
  port: "5432"
  name: "rhesis-analytics-prd-db"

valkey:
  enabled: true
  auth:
    enabled: true
    existingSecret: "rhesis-app-secrets"
    existingSecretPasswordKey: "REDIS_PASSWORD"
  primary:
    persistence:
      size: 5Gi
