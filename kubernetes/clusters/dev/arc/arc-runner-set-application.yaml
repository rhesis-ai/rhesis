# Installs the ARC runner scale set for the dev cluster.
# Runners register with GitHub as label "arc-runner-dev" so deploy jobs that
# target this cluster use: runs-on: arc-runner-dev
#
# Sync wave 3: after ExternalSecret (wave 2) has created the arc-github-app-secret
# K8s Secret that githubConfigSecret references.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-arc-runner-set
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: arc-runners
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.9.3
    helm:
      valuesObject:
        githubConfigUrl: https://github.com/rhesis-ai/rhesis
        githubConfigSecret: arc-github-app-secret
        # ArgoCD renders charts with `helm template` (no cluster lookup), so the
        # chart cannot auto-discover the controller ServiceAccount. Set it explicitly.
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-controller-gha-rs-controller
        runnerScaleSetName: arc-runner-dev
        minRunners: 0
        maxRunners: 3
        template:
          spec:
            containers:
              - name: runner
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: "1"
                    memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - SkipDryRunOnMissingResource=true
