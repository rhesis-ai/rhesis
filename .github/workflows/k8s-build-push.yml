name: "[Build & Push] K8s Image (reusable)"

on:
  workflow_call:
    inputs:
      image:
        description: 'Artifact Registry image name (e.g. rhesis-backend)'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: true
        type: string
      context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      target:
        description: 'Optional Docker multi-stage target'
        required: false
        type: string
        default: ''
      build_args:
        description: 'Optional extra docker build --build-arg lines (one per line)'
        required: false
        type: string
        default: ''
      environment:
        description: 'Target environment (dev, stg, prd)'
        required: true
        type: string
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        type: string
        default: ''
    outputs:
      tag:
        description: 'Resolved image tag (override or short git SHA)'
        value: ${{ jobs.build.outputs.tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}

    env:
      ENVIRONMENT: ${{ inputs.environment }}
      IMAGE: ${{ inputs.image }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve GCP credentials and authenticate
        env:
          GCP_SA_KEY_DEV: ${{ secrets.GCP_SA_KEY_DEV }}
          GCP_SA_KEY_STG: ${{ secrets.GCP_SA_KEY_STG }}
          GCP_SA_KEY_PRD: ${{ secrets.GCP_SA_KEY_PRD }}
        run: |
          SA_KEY_PATH="${RUNNER_TEMP}/sa-key.json"
          echo "SA_KEY_PATH=$SA_KEY_PATH" >> "$GITHUB_ENV"
          # EXIT trap: cleans up if this step fails. Auth runs in this same step so the
          # key is not deleted before gcloud can read it (unlike a separate auth step).
          trap 'rm -f "$SA_KEY_PATH"' EXIT

          if [ -z "$ENVIRONMENT" ]; then
            echo "ERROR: ENVIRONMENT is not set"
            exit 1
          fi

          # Pre-create with restricted permissions before writing the secret into it.
          install -m 600 /dev/null "$SA_KEY_PATH"

          if [ "$ENVIRONMENT" = "dev" ]; then
            echo "$GCP_SA_KEY_DEV" > "$SA_KEY_PATH"
            echo "PROJECT_ID=${{ secrets.TF_PROJECT_ID_DEV }}" >> "$GITHUB_ENV"
            echo "REGISTRY_HOST=europe-west4-docker.pkg.dev" >> "$GITHUB_ENV"
          elif [ "$ENVIRONMENT" = "stg" ]; then
            echo "$GCP_SA_KEY_STG" > "$SA_KEY_PATH"
            echo "PROJECT_ID=${{ secrets.TF_PROJECT_ID_STG }}" >> "$GITHUB_ENV"
            echo "REGISTRY_HOST=europe-west4-docker.pkg.dev" >> "$GITHUB_ENV"
          elif [ "$ENVIRONMENT" = "prd" ]; then
            echo "$GCP_SA_KEY_PRD" > "$SA_KEY_PATH"
            echo "PROJECT_ID=${{ secrets.TF_PROJECT_ID_PRD }}" >> "$GITHUB_ENV"
            echo "REGISTRY_HOST=europe-west4-docker.pkg.dev" >> "$GITHUB_ENV"
          else
            echo "ERROR: Unknown ENVIRONMENT: $ENVIRONMENT"
            exit 1
          fi

          gcloud auth activate-service-account --key-file="$SA_KEY_PATH"
          # Credentials live in gcloud config; remove key before later steps (build/push).
          rm -f "$SA_KEY_PATH"
          trap - EXIT

      - name: Set registry and tag
        run: |
          REGISTRY="${{ env.REGISTRY_HOST }}/${{ env.PROJECT_ID }}/rhesis"
          echo "REGISTRY=$REGISTRY" >> "$GITHUB_ENV"

          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(echo "${{ github.sha }}" | cut -c1-8)
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"

          echo "Registry host:   ${{ env.REGISTRY_HOST }}"
          echo "Registry:        $REGISTRY"
          echo "Tag:             $TAG"
          echo "Image:           $IMAGE"

      - id: set-tag
        name: Expose resolved tag as output
        run: echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGISTRY_HOST }}" --quiet

      - name: Build Container
        env:
          NEXT_PUBLIC_ONBOARDING_VIDEO_URL: ${{ secrets.NEXT_PUBLIC_ONBOARDING_VIDEO_URL }}
        run: |
          TARGET_ARGS=()
          if [ -n "${{ inputs.target }}" ]; then
            TARGET_ARGS=(--target "${{ inputs.target }}")
          fi

          BUILD_ARG_LINES="${{ inputs.build_args }}"
          BUILD_ARG_FLAGS=()
          if [ -n "$BUILD_ARG_LINES" ]; then
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              BUILD_ARG_FLAGS+=(--build-arg "$line")
            done <<< "$BUILD_ARG_LINES"
          fi

          if [ -n "$NEXT_PUBLIC_ONBOARDING_VIDEO_URL" ]; then
            BUILD_ARG_FLAGS+=(--build-arg "NEXT_PUBLIC_ONBOARDING_VIDEO_URL=$NEXT_PUBLIC_ONBOARDING_VIDEO_URL")
          fi

          docker build --platform linux/amd64 \
            "${TARGET_ARGS[@]}" \
            "${BUILD_ARG_FLAGS[@]}" \
            -t "$REGISTRY/$IMAGE:$TAG" \
            -f "${{ inputs.dockerfile }}" \
            "${{ inputs.context }}"
          echo "Built $REGISTRY/$IMAGE:$TAG"
      # provides too many false positives on initial run
      # - name: Scan image for vulnerabilities
      #   uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      #   with:
      #     image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG }}"
      #     format: table
      #     exit-code: 1
      #     severity: CRITICAL
      #     ignore-unfixed: true
      #     version: v0.69.2

      - name: Push Container
        run: |
          docker push "$REGISTRY/$IMAGE:$TAG"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$REGISTRY/$IMAGE:$TAG")
          echo "Digest: $DIGEST"
          echo "IMAGE_DIGEST=$DIGEST" >> "$GITHUB_ENV"
          echo "Pushed $REGISTRY/$IMAGE:$TAG ($DIGEST)"

      # Safety net for SIGKILL on the credentials step (trap cannot fire on SIGKILL).
      # Key is deleted inside the credentials step on normal/SIGTERM paths; this covers forced kills.
      - name: Cleanup SA key
        if: always()
        run: rm -f "${SA_KEY_PATH:-${RUNNER_TEMP}/sa-key.json}"
