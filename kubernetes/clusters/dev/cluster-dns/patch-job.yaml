# ArgoCD PreSync hook: idempotently adds the rhesis.ai:53 stub zone to the
# node-local-dns Corefile so that cluster pods resolve internal rhesis.ai
# hostnames via BIND9 (internal LB IPs) instead of public DNS.
#
# Runs before every ArgoCD sync; exits 0 immediately if already patched.
# hook-delete-policy: HookSucceeded cleans up the completed Job on next sync.
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-node-local-dns
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: cluster-dns-patcher
      restartPolicy: OnFailure
      containers:
        - name: patcher
          image: alpine/k8s:1.30.12
          command:
            - sh
            - -c
            - |
              set -eu

              BIND9_IP="${BIND9_IP}"

              # Idempotency check — skip if already patched
              CURRENT=$(kubectl get configmap node-local-dns -n kube-system \
                -o jsonpath='{.data.Corefile}')
              if echo "$CURRENT" | grep -q "rhesis.ai:53" && echo "$CURRENT" | grep -q "${BIND9_IP}"; then
                echo "node-local-dns already has rhesis.ai zone with correct BIND9 IP, skipping."
                exit 0
              fi

              # Remove stale rhesis.ai block if present with wrong IP
              if echo "$CURRENT" | grep -q "rhesis.ai:53"; then
                echo "Removing stale rhesis.ai zone (wrong BIND9 IP)..."
                CURRENT=$(printf '%s' "$CURRENT" | python3 -c "import sys,re; c=sys.stdin.read(); print(re.sub(r'rhesis[.]ai:53 [{][^}]+[}]\n?','',c),end='')")
              fi

              echo "Adding rhesis.ai:53 stub zone (BIND9: ${BIND9_IP})..."

              # Prepend stub zone to Corefile using Python (single line avoids YAML indentation conflict)
              NEW_COREFILE=$(printf '%s' "$CURRENT" | python3 -c "import sys,os; ip=os.environ['BIND9_IP']; stub='rhesis.ai:53 {\n    errors\n    cache 30\n    bind 169.254.20.10\n    forward . '+ip+'\n    prometheus :9253\n    }\n'; print(stub+sys.stdin.read(),end='')")

              # Patch the ConfigMap
              kubectl patch configmap node-local-dns -n kube-system \
                --type merge \
                --patch "{\"data\":{\"Corefile\":$(printf '%s' "$NEW_COREFILE" | jq -Rs .)}}"

              # Restart node-local-dns so pods reload the new Corefile
              kubectl patch daemonset node-local-dns -n kube-system \
                -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$(date -u +%FT%TZ)\"}}}}}"

              echo "Done."
          env:
            - name: BIND9_IP
              value: "10.0.0.10"
