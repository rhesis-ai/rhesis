apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prd-arc-runner-set
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: arc-runners
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.9.3
    helm:
      valuesObject:
        githubConfigUrl: https://github.com/rhesis-ai/rhesis
        githubConfigSecret: arc-github-app-secret
        # ArgoCD renders charts with `helm template` (no cluster lookup), so the
        # chart cannot auto-discover the controller ServiceAccount. Set it explicitly.
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-controller-gha-rs-controller
        runnerScaleSetName: arc-runner-prd
        minRunners: 0
        maxRunners: 5
        template:
          spec:
            containers:
              - name: runner
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: "2"
                    memory: 4Gi
        containerMode:
          type: kubernetes
          kubernetesModeWorkVolumeClaim:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - SkipDryRunOnMissingResource=true
