name: "[Deploy] All for K8s"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        default: ''
        type: string

jobs:
  backend-build:
    uses: ./.github/workflows/k8s-build-push.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      image: rhesis-backend
      dockerfile: apps/backend/Dockerfile
      target: backend
    secrets: inherit

  worker-build:
    uses: ./.github/workflows/k8s-build-push.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      image: rhesis-worker
      dockerfile: apps/backend/Dockerfile
      target: worker
    secrets: inherit

  frontend-build:
    uses: ./.github/workflows/k8s-build-push.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      image: rhesis-frontend
      dockerfile: apps/frontend/Dockerfile
      frontend: true
    secrets: inherit

  chatbot-build:
    uses: ./.github/workflows/k8s-build-push.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      image: rhesis-chatbot
      dockerfile: apps/chatbot/Dockerfile
    secrets: inherit

  polyphemus-build:
    uses: ./.github/workflows/k8s-build-push.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      image: rhesis-polyphemus
      dockerfile: apps/polyphemus/Dockerfile
    secrets: inherit

  otel-collector-build:
    uses: ./.github/workflows/k8s-build-push.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      image: rhesis-otel-collector
      dockerfile: apps/otel-collector/Dockerfile
      context: apps/otel-collector
    secrets: inherit

  telemetry-processor-build:
    uses: ./.github/workflows/k8s-build-push.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      image: rhesis-telemetry-processor
      dockerfile: apps/telemetry-processor/Dockerfile
      context: apps/telemetry-processor
    secrets: inherit
