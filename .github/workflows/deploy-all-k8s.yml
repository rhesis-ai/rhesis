name: "[Build & Deploy] All for K8s"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to build and push to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      environment:
        description: 'Environment to build and push to'
        required: true
        type: string
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: k8s-deploy-all-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}
    steps:
      - name: Approve build and push all K8s services
        run: |
          echo "Building and pushing all K8s service images to ${{ inputs.environment || 'dev' }}"
          echo "Tag override: ${{ inputs.tag || '(short git SHA)' }}"

      - id: resolve-tag
        name: Resolve image tag
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(echo "${{ github.sha }}" | cut -c1-8)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

  # Deploy-all service list — each service needs a build job below and a matching
  # entry in deploy-all needs. When adding a service, also update the helm-set
  # loop in k8s-deploy.yml (empty service case). chatbot is excluded (9GB image;
  # deploy separately via chatbot-k8s.yml).
  backend-build:
    needs: gate
    uses: ./.github/workflows/backend-k8s.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      tag: ${{ needs.gate.outputs.tag }}
      deploy: false
    secrets: inherit

  worker-build:
    needs: gate
    uses: ./.github/workflows/worker-k8s.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      tag: ${{ needs.gate.outputs.tag }}
      deploy: false
    secrets: inherit

  frontend-build:
    needs: gate
    uses: ./.github/workflows/frontend-k8s.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      tag: ${{ needs.gate.outputs.tag }}
      deploy: false
    secrets: inherit

  docs-build:
    needs: gate
    uses: ./.github/workflows/docs-k8s.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      tag: ${{ needs.gate.outputs.tag }}
      deploy: false
    secrets: inherit

  polyphemus-build:
    needs: gate
    uses: ./.github/workflows/polyphemus-k8s.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      tag: ${{ needs.gate.outputs.tag }}
      deploy: false
    secrets: inherit

  otel-collector-build:
    needs: gate
    uses: ./.github/workflows/otel-collector-k8s.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      tag: ${{ needs.gate.outputs.tag }}
      deploy: false
    secrets: inherit

  telemetry-processor-build:
    needs: gate
    uses: ./.github/workflows/telemetry-processor-k8s.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      tag: ${{ needs.gate.outputs.tag }}
      deploy: false
    secrets: inherit

  # After all images are pushed, k8s-deploy.yml sets per-service image tags and
  # syncs ArgoCD (see k8s-deploy.yml for why global.imageTag is not used).
  deploy-all:
    needs:
      - gate
      - backend-build
      - worker-build
      - frontend-build
      - docs-build
      - polyphemus-build
      - otel-collector-build
      - telemetry-processor-build
    uses: ./.github/workflows/k8s-deploy.yml
    with:
      environment: ${{ inputs.environment || 'dev' }}
      tag: ${{ needs.gate.outputs.tag }}
      # service left empty → deploy-all helm-set list in k8s-deploy.yml
    secrets: inherit
