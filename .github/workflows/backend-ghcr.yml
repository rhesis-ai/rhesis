name: "[Build] Backend GHCR"

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/backend/Dockerfile
          target: backend
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ghcr.io/rhesis-ai/backend:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/backend/Dockerfile
          target: worker
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ghcr.io/rhesis-ai/worker:latest

  frontend:
    runs-on: ubuntu-latest

    env:
      FRONTEND_ENV: local
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_QUICK_START: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            FRONTEND_ENV=${{ env.FRONTEND_ENV }}
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_QUICK_START=${{ env.NEXT_PUBLIC_QUICK_START }}
            GIT_BRANCH=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
          push: true
          provenance: false
          tags: ghcr.io/rhesis-ai/frontend:latest
