name: "[Deploy] All for K8s"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        default: ''
        type: string

concurrency:
  group: k8s-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Approve deploy all K8s services
        run: |
          echo "Deploying all K8s services to ${{ github.event.inputs.environment }}"
          echo "Tag override: ${{ github.event.inputs.tag || '(short git SHA)' }}"

  backend-deploy:
    needs: gate
    uses: ./.github/workflows/backend-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  worker-deploy:
    needs: gate
    uses: ./.github/workflows/worker-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  frontend-deploy:
    needs: gate
    uses: ./.github/workflows/frontend-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  docs-deploy:
    needs: gate
    uses: ./.github/workflows/docs-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  chatbot-deploy:
    needs: gate
    uses: ./.github/workflows/chatbot-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  polyphemus-deploy:
    needs: gate
    uses: ./.github/workflows/polyphemus-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  otel-collector-deploy:
    needs: gate
    uses: ./.github/workflows/otel-collector-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  telemetry-processor-deploy:
    needs: gate
    uses: ./.github/workflows/telemetry-processor-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit
