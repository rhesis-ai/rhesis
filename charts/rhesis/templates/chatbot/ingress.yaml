{{- if and .Values.chatbot.enabled .Values.chatbot.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatbot
  namespace: {{ .Release.Namespace }}
  labels:
    app: chatbot
    tier: chatbot
    {{- include "rhesis.labels" . | nindent 4 }}
  {{- with .Values.chatbot.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.chatbot.ingress.className }}
  rules:
    - host: {{ .Values.chatbot.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatbot
                port:
                  number: {{ .Values.chatbot.service.port }}
  tls:
    - hosts:
        - {{ .Values.chatbot.ingress.host | quote }}
      secretName: {{ .Values.chatbot.ingress.tlsSecretName }}
{{- end }}
