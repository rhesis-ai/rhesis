{{- if .Values.chatbot.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: {{ .Release.Namespace }}
  labels:
    app: chatbot
    tier: chatbot
    {{- include "rhesis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.chatbot.replicas }}
  selector:
    matchLabels:
      app: chatbot
      tier: chatbot
  template:
    metadata:
      labels:
        app: chatbot
        tier: chatbot
    spec:
      {{- include "rhesis.podSecurityContext" (dict "Values" .Values "component" .Values.chatbot) | nindent 6 }}
      containers:
        - name: chatbot
          image: {{ include "rhesis.image" (dict "imageValues" .Values.chatbot "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.chatbot.image.pullPolicy | default .Values.global.imagePullPolicy }}
          {{- include "rhesis.containerSecurityContext" (dict "Values" .Values "component" .Values.chatbot) | nindent 10 }}
          ports:
            - containerPort: {{ .Values.chatbot.service.targetPort }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "rhesis.fullname" . }}-config
            - secretRef:
                name: {{ .Values.existingSecret }}
          env:
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            {{- with .Values.chatbot.env }}
            {{- range . }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.chatbot.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.chatbot.service.targetPort }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.chatbot.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
{{- end }}
