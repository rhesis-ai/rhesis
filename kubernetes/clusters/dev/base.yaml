apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-base
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rhesis-ai/rhesis.git
    targetRevision: fix/deployment-automation-test
    path: kubernetes/clusters/dev
    directory:
      recurse: true
      exclude: '{external-secrets/*,external-dns/*,internal-dns/*,ingress-nginx-external/*,ingress-nginx-internal/*,cert-manager/*,**/kustomization.yaml}'
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
