# Dev environment overrides for charts/rhesis/values.yaml
# Merged on top of values.yaml by ArgoCD.

# ---------------------------------------------------------------------------
# Global — GCP Artifact Registry for dev
# GCP project: rhesis-dev-494712 (Artifact Registry host below).
# ---------------------------------------------------------------------------
global:
  registry: "europe-west4-docker.pkg.dev/rhesis-dev-494712/rhesis"
  imagePullPolicy: Always
  # Managed by CI — patched to the git SHA tag after each successful build.
  imageTag: "de9832ee"
  requirePinnedTag: true

# ---------------------------------------------------------------------------
# Non-sensitive config overrides for dev
# ---------------------------------------------------------------------------
config:
  environment: "development"
  # INFO reduces API log I/O under load; use DEBUG only when actively tracing.
  logLevel: "INFO"

  # App DB name (ConfigMap DB_NAME) and Bitnami PostgreSQL bootstrap database.
  dbName: &rhesis_db_name "rhesis-dev-db"
  # Runtime app user — credentials from ESO (APP_DB_USER / APP_DB_PASS).
  dbUser: "rhesis-user"

  # Frontend
  apiBaseUrl: "https://dev-api.rhesis.ai"
  nextPublicAppUrl: "https://dev-app.rhesis.ai"
  nextauthUrl: "https://dev-app.rhesis.ai"
  nextPublicSupportEmail: "hello@rhesis.ai"
  nextPublicOnboardingVideoUrl: "https://youtu.be/fNtxqGtBu2Y"
  # Backend
  rhesisBaseUrl: "https://dev-api.rhesis.ai"
  frontendUrl: "https://dev-app.rhesis.ai"
  backendUrl: "http://backend:8080"

  # GCP
  vertexAiProject: "playground-437609"

  # AI model — Vertex defaults in dev (GEMINI_API_KEY + GOOGLE_APPLICATION_CREDENTIALS in ESO);
  # avoids requiring RHESIS_API_KEY for rhesis/rhesis-default
  defaultGenerationModel: "vertex_ai/gemini-3.1-flash-lite"
  defaultEvaluationModel: "vertex_ai/gemini-3.1-flash-lite"
  defaultExecutionModel: "vertex_ai/gemini-3.1-flash-lite"
  defaultEmbeddingModel: "vertex_ai/text-embedding-005"
  vertexAiLocation: "europe-west4"
  azureOpenAiApiVersion: "2024-02-01"

# ---------------------------------------------------------------------------
# Ingress — all exposed via internal ingress-nginx (accessible over VPN)
# ---------------------------------------------------------------------------
backend:
  # Scale API pods during test runs (live usage ~750m CPU). Requires cluster headroom.
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75
  resources:
    requests:
      # Live: ~750m CPU under test runs; under-requesting causes noisy-neighbor scheduling.
      cpu: "500m"
      # p95 mem=848Mi, max=891Mi — 1Gi matches stg and stabilizes HPA/memory scheduling.
      memory: "1Gi"
    limits:
      # 2 cores for Garak/LiteLLM burst during test generation.
      cpu: "2000m"
      # Garak probe cache pre-warm loads probes + wordnet; 1Gi OOMKills the API.
      memory: "2Gi"
  ingress:
    enabled: true
    host: "dev-api.rhesis.ai"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # Observed startup time: ~93s after container start (StatReload + Garak/LiteLLM imports).
  # Image pull adds ~90s before container start but doesn't count toward probe delay.
  # Helm replaces nested maps — keep full blocks.
  # Liveness worst-case ≈ 180 + 29*45 = 1485s (~25m) before restart if /health never returns.
  livenessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 180
    periodSeconds: 45
    timeoutSeconds: 15
    failureThreshold: 30
  readinessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 120
    periodSeconds: 20
    timeoutSeconds: 15
    failureThreshold: 90

frontend:
  resources:
    requests:
      cpu: "250m"
      memory: "128Mi"
    limits:
      # Next.js SSR needs burst CPU for page renders; 200m caused 10-30% throttling.
      cpu: "1000m"
      memory: "256Mi"
  ingress:
    enabled: true
    host: "dev-app.rhesis.ai"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

docs:
  resources:
    requests:
      # p95 CPU=2.5m, mem=78Mi — very light service.
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  ingress:
    enabled: true
    host: "dev-docs.rhesis.ai"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

chatbot:
  # 9GB image + gunicorn OOMs on e2-medium when co-located with frontend/polyphemus.
  # Set enabled: false if you do not use chatbot in dev (frees ~1 CPU + ~1Gi per node).
  resources:
    requests:
      cpu: "250m"
      memory: "768Mi"
    limits:
      cpu: "1000m"
      memory: "1536Mi"
  ingress:
    enabled: true
    host: "dev-chatbot.rhesis.ai"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

# Analytics DB — same Bitnami PostgreSQL subchart, different database name.
# Mirrors the stg/prd CNPG pattern: database owned by rhesis-****-user.
# ANALYTICS_DB_HOST/PORT rendered by ConfigMap helper (same subchart service).
# ANALYTICS_DB_USER / ANALYTICS_DB_PASS come from rhesis-app-secrets (ESO):
#   dev-rhesis-analytics-db-user → rhesis-****-user
#   dev-rhesis-analytics-db-pass → <password>
externalAnalyticsDatabase:
  name: "rhesis-analytics-dev-db"

otelCollector:
  resources:
    requests:
      # p95 CPU=2.5m, mem=32Mi — very light.
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      # max=70Mi — 128Mi gives generous spike headroom.
      memory: "128Mi"
  ingress:
    enabled: true
    host: "dev-telemetry.rhesis.ai"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

workers:
  - name: default
    enabled: true
    image:
      repository: rhesis-worker
      tag: "de9832ee"
    replicas: 1
    resources:
      requests:
        # Live: ~900Mi+ per worker; 250m CPU request improves spread across nodes.
        cpu: "250m"
        memory: "1Gi"
      limits:
        # Same as backend: heavy ML imports (litellm, garak) OOMKill at 1Gi
        memory: "2Gi"
        cpu: "1000m"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 60
      targetMemoryUtilizationPercentage: 75
    # Dev: Celery worker loads heavy ML imports (LiteLLM, Garak) on startup.
    # Allow extra headroom vs backend (no StatReload, but Garak cache pre-warm).
    # Liveness worst-case ≈ 240 + 29×45 = 1545s (~26m) before restart.
    livenessProbe:
      httpGet:
        path: /health/basic
      initialDelaySeconds: 240
      periodSeconds: 45
      timeoutSeconds: 15
      failureThreshold: 30
    readinessProbe:
      httpGet:
        path: /health/basic
      initialDelaySeconds: 150
      periodSeconds: 20
      timeoutSeconds: 15
      failureThreshold: 90
    env:
      - name: CELERY_WORKER_CONCURRENCY
        value: "2"

telemetryProcessor:
  enabled: true
  resources:
    requests:
      # p95 CPU=3m, mem=49Mi — lightweight gRPC processor.
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

polyphemus:
  resources:
    requests:
      cpu: "100m"
      # p95 mem=454Mi, max=458Mi — very consistent; 512Mi gives 10% buffer.
      memory: "512Mi"
    limits:
      cpu: "500m"
      # max=458Mi × 1.3 = 595Mi → 640Mi.
      memory: "640Mi"
  ingress:
    enabled: true
    host: "dev-polyphemus.rhesis.ai"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # Polyphemus: similar Python/FastAPI startup to backend (~90-120s observed).
  # Liveness worst-case ≈ 180 + 29×45 = 1485s (~25m) before restart.
  livenessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 180
    periodSeconds: 45
    timeoutSeconds: 15
    failureThreshold: 30
  readinessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 120
    periodSeconds: 20
    timeoutSeconds: 15
    failureThreshold: 90
# ---------------------------------------------------------------------------
# PostgreSQL — Bitnami subchart enabled for dev (no CNPG in this branch)
# Uses pgvector image (official Postgres entrypoint). That entrypoint reads POSTGRES_DB
# on first init; the Bitnami chart only sets POSTGRES_DATABASE (Bitnami image). Setting
# POSTGRES_DB via extraEnvVars ensures the database exists on fresh PVCs.
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  image:
    registry: ""
    repository: pgvector/pgvector
    tag: pg16
    pullPolicy: IfNotPresent
  auth:
    database: *rhesis_db_name
    # Bootstrap superuser / migration owner (ADMIN_DB_* in ESO).
    username: &rhesis_admin_user "rhesis-admin"
    existingSecret: "rhesis-app-secrets"
    secretKeys:
      adminPasswordKey: "ADMIN_DB_PASS"
      userPasswordKey: "APP_DB_PASS"
  primary:
    extraEnvVars:
      - name: POSTGRES_DB
        value: *rhesis_db_name
      - name: APP_DB_PASS
        valueFrom:
          secretKeyRef:
            name: rhesis-app-secrets
            key: APP_DB_PASS
      - name: ANALYTICS_DB_PASS
        valueFrom:
          secretKeyRef:
            name: rhesis-app-secrets
            key: ANALYTICS_DB_PASS
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: "100m"
        # p95 mem=366Mi, max=386Mi — 416Mi gives ~10% buffer above max.
        memory: "416Mi"
      limits:
        cpu: "500m"
        # max=386Mi × 1.3 = 502Mi → 512Mi.
        memory: "512Mi"
    initdb:
      scripts:
        init-extensions.sql: |
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
        init-analytics-db.sh: |
          #!/bin/bash
          # Mirrors the stg/prd CNPG postInitSQL pattern.
          # Runs as superuser during first-time PVC init only.
          set -e
          psql -v ON_ERROR_STOP=1 -v analytics_pass="$ANALYTICS_DB_PASS" \
            --username "$POSTGRES_USER" --dbname "postgres" <<'EOSQL'
            CREATE ROLE "rhesis-analytics-user" LOGIN PASSWORD :'analytics_pass';
            CREATE DATABASE "rhesis-analytics-dev-db" OWNER "rhesis-analytics-user";
            GRANT CONNECT ON DATABASE "rhesis-analytics-dev-db" TO "rhesis-admin";
          EOSQL
        init-app-user.sh: |
          #!/bin/bash
          # Application runtime role (APP_DB_USER / APP_DB_PASS). Mirrors stg/prd CNPG grants.
          # Runs as rhesis-admin during first-time PVC init only.
          set -e
          psql -v ON_ERROR_STOP=1 -v app_db_pass="$APP_DB_PASS" \
            --username "$POSTGRES_USER" --dbname "postgres" <<'EOSQL'
            CREATE ROLE "rhesis-user" LOGIN PASSWORD :'app_db_pass';
          EOSQL
          psql -v ON_ERROR_STOP=1 -v postgres_db="$POSTGRES_DB" \
            --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<'EOSQL'
            GRANT CONNECT ON DATABASE :"postgres_db" TO "rhesis-user";
            GRANT USAGE ON SCHEMA public TO "rhesis-user";
            GRANT SELECT, INSERT, UPDATE, DELETE, REFERENCES ON ALL TABLES IN SCHEMA public TO "rhesis-user";
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO "rhesis-user";
            ALTER DEFAULT PRIVILEGES FOR ROLE "rhesis-admin" IN SCHEMA public
              GRANT SELECT, INSERT, UPDATE, DELETE, REFERENCES ON TABLES TO "rhesis-user";
            ALTER DEFAULT PRIVILEGES FOR ROLE "rhesis-admin" IN SCHEMA public
              GRANT USAGE, SELECT ON SEQUENCES TO "rhesis-user";
          EOSQL
    podSecurityContext:
      enabled: true
      fsGroup: 999
    containerSecurityContext:
      enabled: true
      runAsUser: 999
      runAsNonRoot: true
      readOnlyRootFilesystem: false

# ---------------------------------------------------------------------------
# Valkey — in-cluster (required)
# ---------------------------------------------------------------------------
valkey:
  enabled: true
  auth:
    enabled: true
    existingSecret: "rhesis-app-secrets"
    existingSecretPasswordKey: "REDIS_PASSWORD"
  primary:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        # p95 CPU=39.4m, mem=50Mi — small in-cluster cache.
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        # max=54Mi × 1.3 = 70Mi → 128Mi for safety.
        memory: "128Mi"
