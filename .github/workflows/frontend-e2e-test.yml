name: "[Test] Frontend E2E"

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend-e2e-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend-e2e-test.yml'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: make install
        working-directory: apps/frontend

      - name: Get Playwright version
        id: playwright-version
        run: |
          echo "version=$(node -p 'require("@playwright/test/package.json").version')" >> "$GITHUB_OUTPUT"
        working-directory: apps/frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        timeout-minutes: 10
        run: npx playwright install --with-deps chromium
        working-directory: apps/frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run E2E tests (shard ${{ matrix.shard }}/3)
        run: make test-e2e-ci
        working-directory: apps/frontend
        env:
          PLAYWRIGHT_SHARD: "${{ matrix.shard }}/3"

      - name: Stop Docker services
        if: always()
        run: |
          docker compose -f ../../tests/docker-compose.frontend.yml logs frontend-test-backend
          make docker-down
        working-directory: apps/frontend

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shard }}
          path: apps/frontend/blob-report/
          retention-days: 1

  merge-reports:
    if: ${{ !cancelled() }}
    needs: [e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: make install
        working-directory: apps/frontend

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: apps/frontend/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports
        working-directory: apps/frontend

      - name: Upload merged Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 14
