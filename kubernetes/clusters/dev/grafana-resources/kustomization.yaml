apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/grafana-resources

configMapGenerator:
  - name: grafana-config
    literals:
      # Dev testing: zone must match dev external-dns domainFilters (internal-example.com)
      - grafana-hostname=grafana.dev.internal-example.com
      - grafana-root-url=https://grafana.dev.internal-example.com
    options:
      annotations:
        config.kubernetes.io/local-config: "true"
      disableNameSuffixHash: true

replacements:
  - source:
      kind: ConfigMap
      name: grafana-config
      fieldPath: data.grafana-hostname
    targets:
      - select:
          kind: Ingress
          name: grafana-ingress
        fieldPaths:
          - spec.tls.0.hosts.0
          - spec.rules.0.host
  - source:
      kind: ConfigMap
      name: grafana-config
      fieldPath: data.grafana-root-url
    targets:
      - select:
          kind: Grafana
          name: grafana
        fieldPaths:
          - spec.config.server.root_url
