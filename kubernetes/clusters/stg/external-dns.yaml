apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stg-external-dns
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rhesis-ai/rhesis.git
    targetRevision: release/vX.X.X
    path: kubernetes/clusters/stg/external-dns
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
