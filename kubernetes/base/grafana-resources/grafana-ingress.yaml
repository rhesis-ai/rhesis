apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01"
    # Populates grafana-tls with a short-lived cert immediately so the Secret exists
    # while Let's Encrypt HTTP-01 completes; avoids Argo Ingress staying Degraded.
    cert-manager.io/issue-temporary-certificate: "true"
    argocd.argoproj.io/sync-wave: "0"
spec:
  ingressClassName: internal
  tls:
    - hosts:
        - PLACEHOLDER
      secretName: grafana-tls
  rules:
    - host: PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              # Grafana operator creates a Service named <Grafana metadata.name>-service; CR is
              # grafana, so the Service is grafana-service on the default Grafana http port 3000.
              service:
                name: grafana-service
                port:
                  number: 3000
