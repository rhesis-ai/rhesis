name: "[Deploy] All for K8s"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        default: ''
        type: string

jobs:
  backend-deploy:
    uses: ./.github/workflows/backend-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  worker-deploy:
    uses: ./.github/workflows/worker-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  frontend-deploy:
    uses: ./.github/workflows/frontend-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  docs-deploy:
    uses: ./.github/workflows/docs-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  chatbot-deploy:
    uses: ./.github/workflows/chatbot-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  polyphemus-deploy:
    uses: ./.github/workflows/polyphemus-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  otel-collector-deploy:
    uses: ./.github/workflows/otel-collector-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  telemetry-processor-deploy:
    uses: ./.github/workflows/telemetry-processor-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit
