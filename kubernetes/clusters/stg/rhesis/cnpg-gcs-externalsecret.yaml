# Service account JSON (single key key.json) for Barman to write WAL/base backups
# to gs://cnpg-backup-rhesis-stg. The payload is created by Terraform (module
# cnpg_barman_stg: GSA rhesis-cnpg-bk-stg + GSM stg-rhesis-cnpg-gcs-sa-key).
# ESO already has project-level secretAccessor on the ESO GSA.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rhesis-stg-cnpg-gcs
  namespace: rhesis
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: rhesis-stg-cnpg-gcs
    creationPolicy: Owner
  data:
    - secretKey: key.json
      remoteRef:
        key: stg-rhesis-cnpg-gcs-sa-key
