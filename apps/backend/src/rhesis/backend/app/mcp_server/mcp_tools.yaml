tools:
  # ── Projects ──────────────────────────────────────────────
  - name: list_projects
    label: Listing projects
    method: GET
    path: /projects/
    description: >
      List projects in the current organization. Use $select to request
      only the fields you need (e.g. $select=name,id). Use skip/limit
      for pagination.

  - name: create_project
    label: Creating project
    method: POST
    path: /projects/
    requires_confirmation: true
    description: >
      Create a new project to organize test suites. A project groups
      related test sets, test configurations, and test runs.

  # ── Test Sets ─────────────────────────────────────────────
  - name: list_test_sets
    label: Listing test sets
    method: GET
    path: /test_sets/
    description: >
      List test sets in the organization. Test sets group related tests
      that share a common behavior, category, or theme. Use $select to
      request only the fields you need (e.g. $select=name,id,description).

  - name: create_test_set_bulk
    label: Creating test set
    method: POST
    path: /test_sets/bulk
    requires_confirmation: true
    description: >
      Create a test set with its tests in a single operation. The "tests"
      array is REQUIRED and must contain at least one test object.
      Do NOT send server-managed fields (id, user_id, organization_id,
      created_at, updated_at).
    parameters:
      name:
        description: "Test set name (required, string)"
      description:
        description: "Detailed description of the test set's purpose (string)"
      short_description:
        description: "Brief summary, one line (string)"
      priority:
        description: >
          Integer priority value (e.g. 1, 2, 3). Must be an integer, NOT
          a string like "High" or "Low". Omit if unsure.
      tests:
        description: >
          REQUIRED array of test objects (must not be empty). Each object:
          {"prompt": {"content": "the test prompt text",
          "language_code": "en", "expected_response": "optional expected
          answer"}, "behavior": "behavior name", "category": "category
          name", "topic": "topic name"}. behavior/category/topic are
          plain-text names (not UUIDs) — the server resolves or creates
          them automatically. Use list_behaviors, list_categories, and
          list_topics to discover existing values first.

  # ── Tests ─────────────────────────────────────────────────
  - name: list_tests
    label: Listing tests
    method: GET
    path: /tests/
    description: >
      List tests in the organization. Each test defines a prompt,
      expected response behavior, and optional metadata. Use $select to
      request only the fields you need.

  - name: execute_tests
    label: Executing tests
    method: POST
    path: /tests/execute
    requires_confirmation: true
    description: >
      Execute tests against a configured endpoint. Sends prompts to
      the endpoint, collects responses, and evaluates results.

  # ── Test Configurations ───────────────────────────────────
  - name: list_test_configurations
    label: Listing test configurations
    method: GET
    path: /test_configurations/
    description: >
      List test configurations. A test configuration links a test set
      to an endpoint, defining how tests should be run. Use $select to
      request only the fields you need.

  - name: create_test_configuration
    label: Setting up test configuration
    method: POST
    path: /test_configurations/
    requires_confirmation: true
    description: >
      Create a test configuration that links a test set to an endpoint.
      Required: endpoint_id (UUID string), test_set_id (UUID string).
      Optional: category_id, topic_id, prompt_id (all UUID strings),
      attributes (object). After creating a test configuration, call
      execute_test_configuration to run the tests. Do NOT send
      server-managed fields (id, user_id, organization_id, created_at,
      updated_at).

  - name: execute_test_configuration
    label: Running tests
    method: POST
    path: /test_configurations/{test_configuration_id}/execute
    requires_confirmation: true
    description: >
      Execute a test configuration — runs all tests in the linked test
      set against the configured endpoint.

  # ── Test Runs ─────────────────────────────────────────────
  - name: list_test_runs
    label: Checking test runs
    method: GET
    path: /test_runs/
    description: >
      List test runs. Each test run represents one execution of a test
      configuration, with status and timing information. Use $select to
      request only the fields you need.

  - name: create_test_run
    label: Creating test run
    method: POST
    path: /test_runs/
    requires_confirmation: true
    description: >
      Create a new test run to track the execution of a test configuration.

  - name: get_test_run
    label: Checking test run status
    method: GET
    path: /test_runs/{test_run_id}
    description: >
      Get details of a specific test run including its status, timing,
      and associated test results.

  # ── Test Results ──────────────────────────────────────────
  - name: list_test_results
    label: Retrieving test results
    method: GET
    path: /test_results/
    description: >
      List test results. Each result contains the prompt sent, the
      response received, and evaluation scores from metrics. Use $select
      to request only the fields you need.

  - name: get_test_result
    label: Retrieving test result
    method: GET
    path: /test_results/{test_result_id}
    description: >
      Get details of a specific test result including the prompt,
      response, metric scores, and evaluation details.

  # ── Behaviors ─────────────────────────────────────────────
  - name: list_behaviors
    label: Looking up behaviors
    method: GET
    path: /behaviors/
    description: >
      List available behaviors. Behaviors define what an endpoint should
      do (e.g., "answer questions accurately", "refuse harmful requests").
      Use $select to request only the fields you need.

  - name: create_behavior
    label: Creating behavior
    method: POST
    path: /behaviors/
    requires_confirmation: true
    description: >
      Create a behavior with a name AND description upfront. Use this
      BEFORE create_test_set_bulk so that when test objects reference
      the behavior by name, the server finds the pre-created behavior
      (with its description) instead of auto-creating a description-less
      one. Do NOT send server-managed fields (id, user_id, organization_id,
      created_at, updated_at).
    parameters:
      name:
        description: "REQUIRED. Behavior name (string, e.g. 'Refuses harmful requests')."
      description:
        description: "REQUIRED. Explain what this behavior means and how it should be evaluated."

  # ── Categories & Topics ───────────────────────────────────
  - name: list_categories
    label: Listing categories
    method: GET
    path: /categories/
    description: >
      List available categories. Categories classify tests by type
      (e.g., "functional", "safety", "robustness"). Use $select to
      request only the fields you need.

  - name: list_topics
    label: Listing topics
    method: GET
    path: /topics/
    description: >
      List available topics. Topics define subject areas for tests
      (e.g., "healthcare", "finance", "general knowledge"). Use $select
      to request only the fields you need.

  - name: update_behavior
    label: Updating behavior
    method: PUT
    path: /behaviors/{behavior_id}
    requires_confirmation: true
    description: >
      Update an existing behavior's fields. Use this to add a description
      to a behavior that was auto-created by create_test_set_bulk (which
      only sets the name). A behavior with a clear description is more
      useful for test planning and metric evaluation.
    parameters:
      behavior_id:
        description: "REQUIRED. UUID of the behavior to update."
      name:
        description: "Behavior name (string). Omit to keep unchanged."
      description:
        description: "Behavior description (string). Explain what this behavior means and how it should be evaluated."

  - name: list_metrics
    label: Checking existing metrics
    method: GET
    path: /metrics/
    description: >
      List available metrics for evaluating test results. Metrics
      define how endpoint responses are scored (e.g., accuracy,
      safety compliance, response quality). Use $select to request
      only the fields you need.

  - name: create_metric
    label: Creating metric
    method: POST
    path: /metrics/
    requires_confirmation: true
    description: >
      Create a new evaluation metric. Do NOT send server-managed fields
      (id, user_id, organization_id, created_at, updated_at, owner_id,
      assignee_id, status_id, model_id, backend_type_id, metric_type_id).
      If you only have a natural-language description, prefer
      generate_metric instead.
    parameters:
      name:
        description: "Metric name, unique within the organization (required, string)"
      metric_type:
        description: >
          Must be "custom-prompt" for user-defined metrics. Always
          include this field.
      backend_type:
        description: >
          Must be "custom" for user-defined metrics. Always include
          this field.
      score_type:
        description: >
          REQUIRED. Must be exactly "numeric" or "categorical" (string
          enum). No other values are accepted.
      evaluation_prompt:
        description: >
          REQUIRED. The prompt template used to evaluate endpoint
          responses. May reference {{prompt}}, {{response}}, and
          {{expected_response}} placeholders (string).
      metric_scope:
        description: >
          List of strings. Each value must be exactly "Single-Turn" or
          "Multi-Turn". Always include this field.
      min_score:
        description: "Minimum score value, number (numeric metrics only)"
      max_score:
        description: "Maximum score value, number (numeric metrics only)"
      threshold:
        description: "Pass/fail threshold, number (numeric metrics only)"
      threshold_operator:
        description: >
          Comparison operator for the threshold. Must be exactly one of:
          "=", "<", ">", "<=", ">=", "!=". Default is ">=".
          Only used for numeric metrics.
      categories:
        description: >
          List of category label strings (categorical metrics only).
          Must be a non-empty list when score_type is "categorical".
      passing_categories:
        description: >
          Subset of categories that indicate a pass (categorical metrics
          only). Must be a non-empty list of strings that also appear in
          "categories".

  - name: generate_metric
    label: Generating metric
    method: POST
    path: /metrics/generate
    requires_confirmation: true
    description: >
      Auto-generate a complete metric from a natural-language description.
      An LLM produces all required fields (name, evaluation_prompt,
      score_type, thresholds, categories, etc.) and the metric is
      persisted automatically. Use this when you know WHAT to measure
      but don't want to fill every field manually. Returns the created
      metric object.
    parameters:
      prompt:
        description: >
          REQUIRED. Natural-language description of what the metric
          should evaluate (e.g. "measure whether responses are factually
          accurate, on a 1-5 numeric scale").

  - name: improve_metric
    label: Improving metric
    method: POST
    path: /metrics/{metric_id}/improve
    requires_confirmation: true
    description: >
      Improve an existing metric using natural-language edit instructions.
      The LLM reads the current metric fields and applies the requested
      changes (e.g. "make the threshold stricter", "add multi-turn
      support"). The metric is updated in place and returned.
    parameters:
      metric_id:
        description: "REQUIRED. UUID of the metric to improve (path parameter)."
      prompt:
        description: >
          REQUIRED. Natural-language instructions describing what to change
          (e.g. "lower the threshold to 2", "switch to categorical with
          pass/fail categories").

  - name: add_behavior_to_metric
    label: Linking behavior to metric
    method: POST
    path: /metrics/{metric_id}/behaviors/{behavior_id}
    requires_confirmation: true
    description: >
      Link a behavior to a metric, so the metric is used to evaluate
      that behavior during test runs. Both the metric and the behavior
      must already exist. Call this after creating or generating a metric
      to wire it to the relevant behaviors. Idempotent — calling it
      again for the same pair is a no-op.
    parameters:
      metric_id:
        description: "REQUIRED. UUID of the metric."
      behavior_id:
        description: "REQUIRED. UUID of the behavior to associate."

  - name: get_metric_behaviors
    label: Checking metric behaviors
    method: GET
    path: /metrics/{metric_id}/behaviors/
    description: >
      List all behaviors currently linked to a metric. Use this to
      verify which behaviors a metric evaluates or to check whether a
      specific behavior is already associated before calling
      add_behavior_to_metric.
    parameters:
      metric_id:
        description: "REQUIRED. UUID of the metric."

  - name: list_endpoints
    label: Finding endpoints
    method: GET
    path: /endpoints/
    description: >
      List configured endpoints. Endpoints are the AI systems being
      tested (chat APIs, completion APIs, etc.). Use $select to request
      only the fields you need (e.g. $select=name,id,url,description).

  - name: check_endpoint
    label: Checking endpoint connectivity
    method: POST
    path: /endpoints/{endpoint_id}/invoke
    requires_confirmation: false
    description: >
      Send a test message to an endpoint to verify it is reachable and
      responding. Only use this when you are about to act on the endpoint
      (explore, run tests, send a request) — not when simply listing or
      looking up endpoints. Send a simple input like {"input": "hello"}
      and check whether the response is valid. Report any errors to the
      user (e.g. connection refused, timeout, auth failure).
    parameters:
      endpoint_id:
        description: "REQUIRED. UUID of the endpoint to check."
      input:
        description: "A simple test message string (e.g. 'hello')."
