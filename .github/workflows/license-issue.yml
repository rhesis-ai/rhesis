name: "[EE] Issue License"

# Mint a signed license token and write it to organization.license for a
# target org, using a Cloud Run Job built from the existing backend image
# (which already bundles the EE package).
#
# Environment separation follows the same model as every other workflow:
# env-specific values live in GitHub Environments (dev / stg / prd).
# Two secrets must be set per GitHub Environment before this workflow runs:
#
#   RHESIS_LICENSE_PRIVATE_KEY  — Ed25519 private key PEM for that environment.
#                          dev + stg share the nonprod keypair;
#                          prd gets its own prod keypair.
#   RHESIS_LICENSE_KID          — Key ID that matches the public key baked into the
#                          backend image for that environment.
#                          dev + stg: "rhesis-nonprod-v1"
#                          prd:       "rhesis-prod-v1"
#
# The key is passed to the Cloud Run job as an env var (--set-env-vars).
# It is visible to GCP project admins in the Cloud Run job definition —
# this is the "for now" tradeoff. If that visibility becomes a concern,
# the upgrade path is to write the key from the GitHub secret into a GCP
# Secret Manager secret at runtime and switch to --set-secrets instead.
#
# The issued token is written to the database only (never printed to logs).
#
# One-time setup per GitHub Environment:
#   1. Set RHESIS_LICENSE_PRIVATE_KEY to the Ed25519 private key PEM.
#   2. Set RHESIS_LICENSE_KID to the matching key ID (see above).
#   3. Configure the "prd" GitHub Environment with required reviewers.
#
# Usage:
#   GitHub Actions → "[EE] Issue License" → Run workflow.
#   Check dry_run to mint without writing to the database.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prd
      org_id:
        description: "Organization UUID to issue the license to"
        required: true
        type: string
      edition:
        description: "License tier (starter / premium / enterprise / master / trial)"
        required: true
        default: "enterprise"
        type: string
      ttl_days:
        description: "Validity period in days"
        required: true
        default: "365"
        type: string
      status:
        description: "Billing status (active / past_due)"
        required: false
        default: "active"
        type: string
      image_tag:
        description: "Backend image tag to run (default: latest deployed tag)"
        required: false
        default: "latest"
        type: string
      dry_run:
        description: "Dry-run: mint token but do NOT write to the database"
        required: false
        default: false
        type: boolean

env:
  SA_KEY_PATH: "gcp-sa-key.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate environment parameter
        uses: ./.github/actions/validate-environment
        with:
          environment: ${{ github.event.inputs.environment }}

      - name: Validate org_id
        run: |
          ORG_ID="${{ github.event.inputs.org_id }}"
          if [ -z "$ORG_ID" ]; then
            echo "❌ org_id is required."
            exit 1
          fi
          if [ "$ORG_ID" = "*" ]; then
            echo "❌ Blanket subject '*' cannot be issued via this workflow."
            echo "   Blanket tokens are deployed as the RHESIS_LICENSE env var."
            echo "   Use the 'mint' CLI command locally to generate a blanket token."
            exit 1
          fi
          echo "✅ org_id validated: $ORG_ID"

  issue:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # The `prd` GitHub Environment requires reviewer approval before this job
    # runs — and it's what hands the prod RHESIS_LICENSE_PRIVATE_KEY to the workflow.
    # dev/stg environments have no gate and use the nonprod key.
    environment: ${{ github.event.inputs.environment }}

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate RHESIS_LICENSE_PRIVATE_KEY is set
        run: |
          if [ -z "${{ secrets.RHESIS_LICENSE_PRIVATE_KEY }}" ]; then
            echo "❌ RHESIS_LICENSE_PRIVATE_KEY is not set for the '${{ github.event.inputs.environment }}' GitHub Environment."
            echo "   Add it under Settings → Environments → ${{ github.event.inputs.environment }} → Environment secrets."
            exit 1
          fi
          if [ -z "${{ secrets.RHESIS_LICENSE_KID }}" ]; then
            echo "❌ RHESIS_LICENSE_KID is not set for the '${{ github.event.inputs.environment }}' GitHub Environment."
            echo "   Add it under Settings → Environments → ${{ github.event.inputs.environment }} → Environment secrets."
            exit 1
          fi
          echo "✅ RHESIS_LICENSE_PRIVATE_KEY and RHESIS_LICENSE_KID are set for ${{ github.event.inputs.environment }}"

      - name: Create and validate service account key file
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > ${{ env.SA_KEY_PATH }}
          if ! jq . ${{ env.SA_KEY_PATH }} > /dev/null 2>&1; then
            echo "❌ Error: Service account key is not valid JSON"
            exit 1
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(realpath ${{ env.SA_KEY_PATH }})" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set environment variables
        run: |
          echo "PROJECT_ID=${{ secrets.PROJECT_ID }}" >> $GITHUB_ENV
          echo "REGION=${{ secrets.REGION || 'us-central1' }}" >> $GITHUB_ENV

      - name: Setup service environment
        id: setup_service_env
        uses: ./.github/actions/setup-service-env
        with:
          environment: ${{ env.ENVIRONMENT }}
          service-type: backend
          project-id: ${{ secrets.PROJECT_ID }}

      - name: Set Cloud SQL instance variable
        run: |
          echo "CLOUDSQL_INSTANCE=${{ secrets.CLOUDSQL_INSTANCE }}" >> $GITHUB_ENV

      - name: Resolve image tag
        id: image
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ] || [ "$TAG" = "latest" ]; then
            RESOLVED=$(gcloud container images list-tags "${{ env.IMAGE_NAME }}" \
              --project="${{ env.PROJECT_ID }}" \
              --format="get(tags)" \
              --sort-by="~timestamp" \
              --limit=1 | tr ',' '\n' | head -1)
            if [ -z "$RESOLVED" ]; then
              echo "⚠️  Could not resolve latest tag; falling back to 'latest'"
              RESOLVED="latest"
            fi
            TAG="$RESOLVED"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved image tag: $TAG"

      - name: Deploy Cloud Run issuance job
        run: |
          JOB_NAME="${SERVICE_NAME}-license-issue"
          IMAGE="${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          KID="${{ secrets.RHESIS_LICENSE_KID }}"

          # Build CLI args. --dry-run is appended only when requested.
          ARGS="-m,rhesis.backend.ee.licensing.cli,issue"
          ARGS="${ARGS},--org,${{ github.event.inputs.org_id }}"
          ARGS="${ARGS},--edition,${{ github.event.inputs.edition }}"
          ARGS="${ARGS},--ttl-days,${{ github.event.inputs.ttl_days }}"
          ARGS="${ARGS},--status,${{ github.event.inputs.status }}"
          ARGS="${ARGS},--kid,${KID}"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="${ARGS},--dry-run"
          fi

          echo "Deploying/updating Cloud Run Job: $JOB_NAME"
          echo "Image: $IMAGE"
          echo "KID: $KID"
          echo "Dry-run: $DRY_RUN"

          # RHESIS_LICENSE_PRIVATE_KEY is passed via --set-env-vars so the
          # Cloud Run job can read it from its environment. The value comes
          # from the GitHub Environment secret and is masked in Actions logs.
          #
          # Note: env vars set this way are visible to GCP project admins in
          # the Cloud Run console. If that's a concern later, write the key
          # from the GitHub secret into a GCP Secret Manager secret here and
          # switch to --set-secrets instead.
          gcloud run jobs deploy "$JOB_NAME" \
            --image="$IMAGE" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --max-retries=0 \
            --task-timeout=5m \
            --memory=512Mi \
            --cpu=1 \
            --set-cloudsql-instances="${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.CLOUDSQL_INSTANCE }}" \
            --set-env-vars="RHESIS_LICENSE_PRIVATE_KEY=${{ secrets.RHESIS_LICENSE_PRIVATE_KEY }},ENVIRONMENT=${{ env.ENVIRONMENT }},DB_DRIVER=${{ secrets.DB_DRIVER }},DB_HOST=${{ secrets.DB_HOST }},DB_PORT=${{ secrets.DB_PORT }},DB_NAME=${{ secrets.DB_NAME }},APP_DB_USER=${{ secrets.APP_DB_USER }},APP_DB_PASS=${{ secrets.APP_DB_PASS }}" \
            --command=python \
            --args="$ARGS"

          echo "✅ Job definition updated"

      - name: Execute issuance job and wait
        run: |
          JOB_NAME="${SERVICE_NAME}-license-issue"

          echo "🚀 Executing $JOB_NAME ..."
          gcloud run jobs execute "$JOB_NAME" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --wait

          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Issuance job failed (exit code $EXIT_CODE)"
            echo "Check Cloud Run job logs for the issuance summary / error details."
            exit $EXIT_CODE
          fi

          echo "✅ Issuance job completed successfully"
          echo ""
          echo "📋 Audit summary"
          echo "  environment : ${{ env.ENVIRONMENT }}"
          echo "  org_id      : ${{ github.event.inputs.org_id }}"
          echo "  edition     : ${{ github.event.inputs.edition }}"
          echo "  ttl_days    : ${{ github.event.inputs.ttl_days }}"
          echo "  kid         : ${{ secrets.RHESIS_LICENSE_KID }}"
          echo "  dry_run     : ${{ github.event.inputs.dry_run }}"
          echo "  triggered by: ${{ github.actor }}"
          echo ""
          echo "Full issuance summary (org, kid, exp, jti) is in the Cloud Run job execution logs."
          echo "The token value is never printed to logs — it is written to organization.license only."
