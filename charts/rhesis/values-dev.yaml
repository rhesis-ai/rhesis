# Dev environment overrides for charts/rhesis/values.yaml
# Merged on top of values.yaml by ArgoCD.

# ---------------------------------------------------------------------------
# Global — GCP Artifact Registry for dev
# Replace <project-id> with the actual GCP project ID (e.g. rhesis-dev-sandbox)
# ---------------------------------------------------------------------------
global:
  registry: "europe-west4-docker.pkg.dev/rhesis-dev-sandbox/rhesis"
  imagePullPolicy: Always
  imageTag: "latest"

# ---------------------------------------------------------------------------
# Non-sensitive config overrides for dev
# ---------------------------------------------------------------------------
config:
  environment: "dev"
  logLevel: "DEBUG"

  # Database (resolved to rhesis-postgresql service by Bitnami subchart)
  dbName: "rhesis-db"
  dbUser: "rhesis-user"

  # Frontend
  nextPublicApiBaseUrl: "https://dev-api.internal-example.com"
  nextPublicAppUrl: "https://dev-app.internal-example.com"
  nextauthUrl: "https://dev-app.internal-example.com"
  nextPublicAuth0ClientId: "lUO4dMypij4rUrS9gUJpam5Srf0ATtEE"
  nextPublicAuth0Domain: "dev-rhesis.eu.auth0.com"

  # Backend
  rhesisBaseUrl: "https://dev-api.internal-example.com"
  frontendUrl: "https://dev-app.internal-example.com"
  backendUrl: "http://backend:8080"

  # GCP
  vertexAiProject: "rhesis-dev-sandbox"

  # AI model
  azureOpenAiApiVersion: "2024-02-01"

# ---------------------------------------------------------------------------
# Ingress — all exposed via internal ingress-nginx (accessible over VPN)
# ---------------------------------------------------------------------------
backend:
  ingress:
    enabled: false
    host: "dev-api.internal-example.com"

frontend:
  ingress:
    enabled: false
    host: "dev-app.internal-example.com"

docs:
  ingress:
    enabled: true
    host: "docs.internal-example.com"
    tlsEnabled: false

# ---------------------------------------------------------------------------
# PostgreSQL — Bitnami subchart enabled for dev (no CNPG in this branch)
# Uses pgvector image for vector extension support.
# ---------------------------------------------------------------------------
postgresql:
  enabled: false
  image:
    registry: ""
    repository: pgvector/pgvector
    tag: pg16
    pullPolicy: IfNotPresent
  auth:
    database: "rhesis-db"
    username: "rhesis-user"
    existingSecret: "rhesis-app-secrets"
    secretKeys:
      adminPasswordKey: "SQLALCHEMY_DB_PASS"
      userPasswordKey: "SQLALCHEMY_DB_PASS"
  primary:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    initdb:
      scripts:
        init-extensions.sql: |
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

# ---------------------------------------------------------------------------
# Disable all services except docs
# ---------------------------------------------------------------------------
backend:
  enabled: false

frontend:
  enabled: false

workers:
  - name: default
    enabled: false

chatbot:
  enabled: false

polyphemus:
  enabled: false

# ---------------------------------------------------------------------------
# External services (required when postgresql/valkey are disabled)
# ---------------------------------------------------------------------------
externalDatabase:
  host: "placeholder-db-host"

externalValkey:
  host: "placeholder-valkey-host"
valkey:
  enabled: false
  auth:
    enabled: true
    existingSecret: "rhesis-app-secrets"
    existingSecretPasswordKey: "REDIS_PASSWORD"
  primary:
    persistence:
      enabled: true
      size: 1Gi
