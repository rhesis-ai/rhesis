# ExternalSecret: syncs all sensitive Rhesis application credentials from
# GCP Secret Manager into a single Kubernetes Secret named "rhesis-app-secrets".
#
# This secret is referenced by:
#   - All application Deployments (via secretRef in envFrom)
#   - Bitnami Valkey subchart (auth.existingSecret)
#   - Bitnami PostgreSQL subchart (auth.existingSecret)
#
# Create the GCP secrets before deploying:
#   gcloud secrets create dev-rhesis-<name> --replication-policy=automatic \
#     --data-file=- <<< "<value>"
#
# Grant ESO service account access:
#   gcloud secrets add-iam-policy-binding dev-rhesis-<name> \
#     --member="serviceAccount:eso-dev@rhesis-dev-sandbox.iam.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rhesis-app-secrets
  namespace: rhesis
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: rhesis-app-secrets
    creationPolicy: Owner
  data:
    # -----------------------------------------------------------------------
    # Database
    # -----------------------------------------------------------------------
    - secretKey: SQLALCHEMY_DB_PASS
      remoteRef:
        key: dev-rhesis-db-pass

    - secretKey: DB_ENCRYPTION_KEY
      remoteRef:
        key: dev-rhesis-db-encryption-key

    # -----------------------------------------------------------------------
    # Redis / Valkey
    # -----------------------------------------------------------------------
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: dev-rhesis-redis-pass

    # -----------------------------------------------------------------------
    # JWT
    # -----------------------------------------------------------------------
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: dev-rhesis-jwt-secret-key

    # -----------------------------------------------------------------------
    # AI model API keys
    # -----------------------------------------------------------------------
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: dev-rhesis-gemini-api-key

    - secretKey: GOOGLE_API_KEY
      remoteRef:
        key: dev-rhesis-google-api-key

    # -----------------------------------------------------------------------
    # SMTP
    # -----------------------------------------------------------------------
    - secretKey: SMTP_HOST
      remoteRef:
        key: dev-rhesis-smtp-host

    - secretKey: SMTP_USER
      remoteRef:
        key: dev-rhesis-smtp-user

    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: dev-rhesis-smtp-password

    - secretKey: FROM_EMAIL
      remoteRef:
        key: dev-rhesis-from-email

    # -----------------------------------------------------------------------
    # Frontend authentication
    # -----------------------------------------------------------------------
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: dev-rhesis-nextauth-secret

    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: dev-rhesis-google-client-id

    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: dev-rhesis-google-client-secret


    # -----------------------------------------------------------------------
    # GCP service account credentials (JSON)
    # -----------------------------------------------------------------------
    - secretKey: GOOGLE_APPLICATION_CREDENTIALS
      remoteRef:
        key: dev-rhesis-google-application-credentials
