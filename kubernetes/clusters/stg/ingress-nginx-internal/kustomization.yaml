apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/ingress-nginx-internal

configMapGenerator:
  - name: ingress-internal-config
    literals:
      - internal-lb-ip=10.4.2.10
    options:
      annotations:
        config.kubernetes.io/local-config: "true"
      disableNameSuffixHash: true

replacements:
  - source:
      kind: ConfigMap
      name: ingress-internal-config
      fieldPath: data.internal-lb-ip
    targets:
      - select:
          kind: Application
          name: ingress-nginx-internal
        fieldPaths:
          - spec.source.helm.valuesObject.controller.service.internal.loadBalancerIP
