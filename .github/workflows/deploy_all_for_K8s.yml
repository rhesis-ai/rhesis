name: "[Build & Push] All for K8s"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to build and push to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        default: ''
        type: string

concurrency:
  group: k8s-build-push-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Approve build and push all K8s services
        run: |
          echo "Building and pushing all K8s service images to ${{ github.event.inputs.environment }}"
          echo "Tag override: ${{ github.event.inputs.tag || '(short git SHA)' }}"
          echo "Note: cluster rollout requires a GitOps manifest update (ArgoCD)."

  backend-build:
    needs: gate
    uses: ./.github/workflows/backend-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  worker-build:
    needs: gate
    uses: ./.github/workflows/worker-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  frontend-build:
    needs: gate
    uses: ./.github/workflows/frontend-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  docs-build:
    needs: gate
    uses: ./.github/workflows/docs-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  chatbot-build:
    needs: gate
    uses: ./.github/workflows/chatbot-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  polyphemus-build:
    needs: gate
    uses: ./.github/workflows/polyphemus-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  otel-collector-build:
    needs: gate
    uses: ./.github/workflows/otel-collector-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  telemetry-processor-build:
    needs: gate
    uses: ./.github/workflows/telemetry-processor-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
    secrets: inherit
