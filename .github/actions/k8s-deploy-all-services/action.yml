name: 'K8s deploy-all services'
description: |
  Loads the canonical deploy-all service list from .github/k8s/deploy-all-services.json.
  Add new services there only — deploy-all-k8s build matrix and k8s-deploy helm-set
  flags both derive from this file.
outputs:
  build-matrix:
    description: 'JSON array for strategy.matrix.include (service + workflow per entry)'
    value: ${{ steps.load.outputs.build-matrix }}
  helm-image-tags:
    description: 'Newline-separated Helm image.tag paths for deploy-all (empty service)'
    value: ${{ steps.load.outputs.helm-image-tags }}
runs:
  using: 'composite'
  steps:
    - name: Load deploy-all service list
      id: load
      shell: bash
      run: |
        CONFIG="${{ github.workspace }}/.github/k8s/deploy-all-services.json"
        if [ ! -f "$CONFIG" ]; then
          echo "❌ Missing deploy-all manifest: $CONFIG"
          exit 1
        fi
        if ! jq -e 'type == "array" and length > 0' "$CONFIG" >/dev/null; then
          echo "❌ $CONFIG must be a non-empty JSON array"
          exit 1
        fi

        BUILD_MATRIX=$(jq -c '[.[] | {service: .service, workflow: .workflow}]' "$CONFIG")
        echo "build-matrix=$BUILD_MATRIX" >> "$GITHUB_OUTPUT"

        HELM_TAGS=$(jq -r '.[].helmImageTag' "$CONFIG")
        {
          echo 'helm-image-tags<<EOF'
          echo "$HELM_TAGS"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

        echo "Deploy-all services ($(jq 'length' "$CONFIG")):"
        jq -r '.[] | "  \(.service) → \(.workflow) (\(.helmImageTag))"' "$CONFIG"
