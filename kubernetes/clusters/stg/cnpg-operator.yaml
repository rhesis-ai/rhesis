apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stg-cnpg-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rhesis-ai/rhesis.git
    # Promote by merging a bump to this ref after validation on the prior release.
    targetRevision: release/vX.X.X
    path: kubernetes/clusters/stg/cnpg-system
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
