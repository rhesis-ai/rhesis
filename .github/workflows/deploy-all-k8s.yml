name: "[Build & Deploy] All for K8s"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to build and push to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd
      tag:
        description: 'Image tag override (default: short git SHA)'
        required: false
        default: ''
        type: string

concurrency:
  group: k8s-build-push-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}
    steps:
      - name: Approve build and push all K8s services
        run: |
          echo "Building and pushing all K8s service images to ${{ github.event.inputs.environment }}"
          echo "Tag override: ${{ github.event.inputs.tag || '(short git SHA)' }}"

      - id: resolve-tag
        name: Resolve image tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(echo "${{ github.sha }}" | cut -c1-8)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

  backend-build:
    needs: gate
    uses: ./.github/workflows/backend-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      deploy: false
    secrets: inherit

  worker-build:
    needs: gate
    uses: ./.github/workflows/worker-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      deploy: false
    secrets: inherit

  frontend-build:
    needs: gate
    uses: ./.github/workflows/frontend-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      deploy: false
    secrets: inherit

  docs-build:
    needs: gate
    uses: ./.github/workflows/docs-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      deploy: false
    secrets: inherit

  chatbot-build:
    needs: gate
    uses: ./.github/workflows/chatbot-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      deploy: false
    secrets: inherit

  polyphemus-build:
    needs: gate
    uses: ./.github/workflows/polyphemus-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      deploy: false
    secrets: inherit

  otel-collector-build:
    needs: gate
    uses: ./.github/workflows/otel-collector-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      deploy: false
    secrets: inherit

  telemetry-processor-build:
    needs: gate
    uses: ./.github/workflows/telemetry-processor-k8s.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      deploy: false
    secrets: inherit

  # After all images are pushed, update global.imageTag once so ArgoCD
  # rolls all services to the same tag in a single Helm upgrade.
  deploy-all:
    needs:
      - gate
      - backend-build
      - worker-build
      - frontend-build
      - docs-build
      - chatbot-build
      - polyphemus-build
      - otel-collector-build
      - telemetry-processor-build
    uses: ./.github/workflows/k8s-deploy.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ needs.gate.outputs.tag }}
      # service left empty → patches global.imageTag for all services
    secrets: inherit
