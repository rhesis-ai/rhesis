# ExternalSecret: syncs GitHub App credentials from GCP Secret Manager into a
# Kubernetes Secret consumed by the ARC runner scale set.
#
# Prerequisites (one-time, after Terraform apply creates the GSM secrets):
#   gcloud secrets versions add stg-arc-github-app-id \
#     --project=rhesis-stg-494712 --data-file=- <<< "<APP_ID>"
#   gcloud secrets versions add stg-arc-github-app-installation-id \
#     --project=rhesis-stg-494712 --data-file=- <<< "<INSTALLATION_ID>"
#   gcloud secrets versions add stg-arc-github-app-private-key \
#     --project=rhesis-stg-494712 --data-file=/path/to/private-key.pem
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arc-github-app-secret
  namespace: arc-runners
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: arc-github-app-secret
    creationPolicy: Owner
  data:
    - secretKey: github_app_id
      remoteRef:
        key: stg-arc-github-app-id
    - secretKey: github_app_installation_id
      remoteRef:
        key: stg-arc-github-app-installation-id
    - secretKey: github_app_private_key
      remoteRef:
        key: stg-arc-github-app-private-key
