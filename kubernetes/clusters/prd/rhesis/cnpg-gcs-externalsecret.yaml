# Barman GCS key: Terraform module cnpg_barman_prd (GSA rhesis-cnpg-bk-prd) populates
# GSM prd-rhesis-cnpg-gcs-sa-key. ESO syncs it here as key.json for the Cluster.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rhesis-prd-cnpg-gcs
  namespace: rhesis
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: rhesis-prd-cnpg-gcs
    creationPolicy: Owner
  data:
    - secretKey: key.json
      remoteRef:
        key: prd-rhesis-cnpg-gcs-sa-key
