# Default values for the Rhesis Helm chart.
# Override per environment in values-dev.yaml / values-stg.yaml / values-prd.yaml.

# ---------------------------------------------------------------------------
# Global
# ---------------------------------------------------------------------------
global:
  # Full GCP Artifact Registry prefix, e.g.:
  #   europe-west4-docker.pkg.dev/<project-id>/rhesis
  registry: ""
  imagePullPolicy: IfNotPresent
  # Default for local/chart-only use. In env overlays (dev/stg/prd) this is
  # patched to an immutable git SHA tag by CI before each deploy.
  imageTag: ""
  requirePinnedTag: false

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Secret reference
# No secret values are stored here — ever.
# The Kubernetes Secret named below is expected to be synced by ESO before
# the chart is deployed.
# ---------------------------------------------------------------------------
existingSecret: "rhesis-app-secrets"

# ---------------------------------------------------------------------------
# Database credentials (stg / prd with CloudNativePG)
# When database.existingSecret is set:
#   - APP_DB_USER / APP_DB_PASS come from this secret and are used by the
#     application at runtime (e.g. rhesis-user).
#   - ADMIN_DB_USER / ADMIN_DB_PASS come from database.migrationSecret when
#     non-empty (Alembic / migrate.sh, e.g. rhesis-admin); when not set,
#     migrate.sh falls back to APP_DB_* (single-role setups).
# Keys match CNPG declarative role secrets: username, password.
# ---------------------------------------------------------------------------
database:
  existingSecret: ""
  migrationSecret: ""
  usernameKey: username
  passwordKey: password

# ---------------------------------------------------------------------------
# Non-sensitive application configuration (safe to store in Git).
# These are rendered into a ConfigMap by templates/configmap.yaml.
# ---------------------------------------------------------------------------
config:
  environment: "production"
  logLevel: "INFO"

  # Database (host/port/name/user are computed from subchart or externalDatabase)
  dbPort: "5432"
  # Per-env overrides: values-dev.yaml ties Bitnami auth + POSTGRES_DB to this name; stg/prd must
  # keep the same strings as kubernetes/clusters/*/cnpg-cluster/cnpg-cluster.yaml bootstrap.initdb.database.
  dbName: "rhesis-db"
  dbUser: "rhesis-user"
  dbDriver: "postgresql"

  # Redis/Valkey (host is computed from subchart or externalValkey)
  redisPort: "6379"

  # Frontend
  apiBaseUrl: ""
  nextPublicAppUrl: ""
  nextauthUrl: ""
  nextTelemetryDisabled: "1"
  nextPublicQuickStart: "false"
  nextPublicSupportEmail: "hello@rhesis.ai"
  nextPublicOnboardingVideoUrl: ""
  # Backend
  rhesisBaseUrl: ""
  frontendUrl: ""
  backendUrl: ""
  quickStart: "false"

  # AI model configuration
  azureOpenAiDeploymentName: "gpt-4o"
  azureOpenAiApiVersion: ""
  openAiModelName: "gpt-4o"
  geminiModelName: "gemini-2.0-flash-001"
  # Default LLM providers (format: provider/model). See apps/backend/.../constants.py
  defaultGenerationModel: "rhesis/rhesis-default"
  defaultEvaluationModel: "rhesis/rhesis-default"
  defaultExecutionModel: "rhesis/rhesis-default"
  defaultEmbeddingModel: "vertex_ai/text-embedding-005"

  # SMTP
  smtpPort: "465"

  # Celery
  celeryWorkerConcurrency: "8"
  celeryWorkerPrefetchMultiplier: "4"
  celeryWorkerMaxTasksPerChild: "1000"
  celeryWorkerLogLevel: "INFO"

  # GCP / Vertex AI
  vertexAiLocation: "europe-west4"
  vertexAiProject: ""

  # Chatbot
  chatbotRateLimit: "1000"
  rhesisConnectorDisabled: "true"
  rhesisProjectId: ""

  # OTel Collector → Telemetry Processor (in-cluster gRPC)
  otelProcessorEndpoint: "telemetry-processor:4317"
  otelInsecure: "true"
  # Matches backend is_telemetry_enabled(): cloud → always on (T&C consent).
  otelDeploymentType: "cloud"

# ---------------------------------------------------------------------------
# Backend
# ---------------------------------------------------------------------------
backend:
  enabled: true
  image:
    repository: rhesis-backend
    tag: ""
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  # Backend may run heavy startup (e.g. probe caches). Worst-case time before
  # liveness restart ≈ initialDelaySeconds + (failureThreshold - 1) * periodSeconds.
  livenessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 420
    periodSeconds: 30
    timeoutSeconds: 15
    failureThreshold: 25
  readinessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 240
    periodSeconds: 15
    timeoutSeconds: 15
    failureThreshold: 60
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  ingress:
    enabled: false
    className: "internal"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    host: ""
    tlsSecretName: "rhesis-backend-tls"
  env: []
  # disableSecurityContext: false

# ---------------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------------
frontend:
  enabled: true
  image:
    repository: rhesis-frontend
    tag: ""
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  ingress:
    enabled: false
    className: "internal"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    host: ""
    tlsSecretName: "rhesis-frontend-tls"
  env: []
  # disableSecurityContext: false

# ---------------------------------------------------------------------------
# Workers (iterable — one Deployment per list entry, no Service/Ingress)
# ---------------------------------------------------------------------------
workers:
  - name: default
    enabled: true
    image:
      repository: rhesis-worker
      tag: ""
    replicas: 1
    resources:
      requests:
        memory: "512Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "250m"
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    env: []

# ---------------------------------------------------------------------------
# Chatbot
# ---------------------------------------------------------------------------
chatbot:
  enabled: true
  image:
    repository: rhesis-chatbot
    tag: ""
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "500m"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  service:
    type: ClusterIP
    port: 8083
    targetPort: 8080
  ingress:
    enabled: false
    className: "internal"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    host: ""
    tlsSecretName: "rhesis-chatbot-tls"
  env: []
  # disableSecurityContext: false

# ---------------------------------------------------------------------------
# Polyphemus
# ---------------------------------------------------------------------------
polyphemus:
  enabled: true
  image:
    repository: rhesis-polyphemus
    tag: ""
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  livenessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 420
    periodSeconds: 30
    timeoutSeconds: 15
    failureThreshold: 25
  readinessProbe:
    httpGet:
      path: /health
    initialDelaySeconds: 240
    periodSeconds: 15
    timeoutSeconds: 15
    failureThreshold: 60
  service:
    type: ClusterIP
    port: 8081
    targetPort: 8080
  ingress:
    enabled: false
    className: "internal"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    host: ""
    tlsSecretName: "rhesis-polyphemus-tls"
  env: []
  # disableSecurityContext: false

# ---------------------------------------------------------------------------
# OTel Collector (custom image apps/otel-collector — OTLP in, export to processor)
# ---------------------------------------------------------------------------
otelCollector:
  enabled: true
  image:
    repository: rhesis-otel-collector
    tag: ""
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  service:
    type: ClusterIP
    port: 4318
    targetPort: 4318
    grpcPort: 4317
    grpcTargetPort: 4317
    healthPort: 13133
    prometheusPort: 8889
  ingress:
    enabled: false
    className: "internal"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    host: ""
    tlsSecretName: "rhesis-otel-collector-tls"
  env: []
  disableSecurityContext: true

# ---------------------------------------------------------------------------
# Telemetry Processor (gRPC ingest → analytics DB)
# ---------------------------------------------------------------------------
telemetryProcessor:
  enabled: true
  image:
    repository: rhesis-telemetry-processor
    tag: ""
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  service:
    type: ClusterIP
    port: 4317
    targetPort: 4317
  env: []
  disableSecurityContext: true

# ---------------------------------------------------------------------------
# Docs
# ---------------------------------------------------------------------------
docs:
  enabled: true
  image:
    repository: rhesis-docs
    tag: ""
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "100m"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  service:
    type: ClusterIP
    port: 3001
    targetPort: 3001
  ingress:
    enabled: false
    className: "internal"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    host: ""
    tlsSecretName: "rhesis-docs-tls"
  env: []
  disableSecurityContext: true   # docs image may need root for Next.js build artifacts

# ---------------------------------------------------------------------------
# Subcharts
# ---------------------------------------------------------------------------

# Valkey (Redis-compatible) — required in-cluster key-value store
valkey:
  enabled: true
  architecture: standalone
  image:
    tag: latest
  auth:
    enabled: true
    existingSecret: "rhesis-app-secrets"
    existingSecretPasswordKey: "REDIS_PASSWORD"
  primary:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

# PostgreSQL — optional (Bitnami chart); set enabled=true for dev/standalone
# For production use CNPG Cluster resource in the GitOps directory instead.
postgresql:
  enabled: false
  auth:
    database: "rhesis-db"
    username: "rhesis-user"
    existingSecret: "rhesis-app-secrets"
    secretKeys:
      adminPasswordKey: "APP_DB_PASS"
      userPasswordKey: "APP_DB_PASS"
  primary:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    initdb:
      scripts:
        init-extensions.sql: |
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

# OpenTelemetry Collector — optional
opentelemetry-collector:
  enabled: false

# ---------------------------------------------------------------------------
# External services (used when subcharts are disabled)
# ---------------------------------------------------------------------------
externalDatabase:
  host: ""
  port: "5432"

# Analytics database — used by telemetry-processor.
# For dev: points at the same Bitnami PostgreSQL subchart (rhesis-analytics-db database).
# For stg/prd: points at a separate CNPG cluster read-write service.
# The password / full URL come from the rhesis-app-secrets ESO secret (ANALYTICS_DB_*).
externalAnalyticsDatabase:
  host: ""
  port: "5432"
  name: "rhesis-analytics-db"

externalValkey:
  host: ""
  port: "6379"

# ---------------------------------------------------------------------------
# Pod & container security contexts
# ---------------------------------------------------------------------------
podSecurityContext:
  enabled: true
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"

containerSecurityContext:
  enabled: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL
